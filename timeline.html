<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Roadmap Timeline</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080808;--s1:#111111;--s2:#1b1b1b;--s3:#262626;--s4:#303030;--s5:#3e3e3e;
  --bd:#2e2e2e;--bd2:#3e3e3e;--bd3:#545454;
  --txt:#ede9e4;--txt2:#b2aaa0;--txt3:#857d75;
  color-scheme:dark;
  --gold:#D0A052;--goldL:#e8c07a;--goldD:rgba(208,160,82,.18);--goldB:rgba(208,160,82,.07);
  --grn:#4caf7d;--red:#e05757;
  --r:6px;--r2:10px;
  --sb:288px;--tlw:204px;--ww:64px;--hdr:58px;
}
/* ── LIGHT THEME ── */
[data-theme="light"]{
  --bg:#f4f1ed;--s1:#ece7e0;--s2:#f8f6f3;--s3:#e8e2db;--s4:#ddd7cf;--s5:#cec7be;
  --bd:#d8d2ca;--bd2:#c5bdb4;--bd3:#aaa098;
  --txt:#1c1814;--txt2:#5a5048;--txt3:#6e6058;
  --gold:#7f6018;--goldL:#9a7820;--goldD:rgba(127,96,24,.15);--goldB:rgba(127,96,24,.07);
  --grn:#2d7a50;--red:#c0392b;
  color-scheme:light;
}
[data-theme="light"] .logo img{filter:brightness(.52)}
[data-theme="light"] .trc.ph-bg{background:rgba(0,0,0,.025)!important}
[data-theme="light"] .btn-gold,[data-theme="light"] .b-primary{color:#f5f0e8}
[data-theme="light"] .today-line{opacity:.55}
[data-theme="light"] .mbg{background:rgba(0,0,0,.45)}
[data-theme="light"] .ctx{box-shadow:0 8px 24px rgba(0,0,0,.18)}

/* ── THEME TOGGLE ── */
.theme-btns{display:flex;gap:5px}
.theme-btn{flex:1;padding:8px 4px;border-radius:var(--r);font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--bd2);color:var(--txt2);background:var(--s2);font-family:inherit;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px}
.theme-btn.on{border-color:var(--gold);color:var(--gold);background:var(--goldD)}
.theme-btn:hover:not(.on){border-color:var(--bd3);color:var(--txt)}

html,body{height:100%;overflow:hidden}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--txt);font-size:14px;line-height:1.5}
/* Screen reader only */
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
/* Global focus ring — accessibility */
*:focus-visible{outline:2px solid var(--gold);outline-offset:2px;border-radius:2px}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}

/* ── HEADER ── */
.hdr{height:var(--hdr);background:var(--s1);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 18px;gap:14px;flex-shrink:0;z-index:30;position:relative}
.logo{display:flex;align-items:center;flex-shrink:0}
.logo img{height:36px;width:auto}
.vsep{width:1px;height:20px;background:var(--bd2);flex-shrink:0}
.hdr-info{flex:1;min-width:0}
.hdr-title{font-family:'Crimson Pro',Georgia,serif;font-size:18px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;transition:color .15s;line-height:1.2}
.hdr-title:hover{color:var(--gold)}
.hdr-sub{font-size:12px;color:var(--txt2);margin-top:1px}
.hdr-stats{display:flex;gap:20px;flex-shrink:0}
.stat{text-align:center}
.stat-n{font-size:17px;font-weight:700;line-height:1}
.stat-n.gd{color:var(--gold)}.stat-n.gn{color:var(--grn)}.stat-n.mt{color:var(--txt3)}
.stat-l{font-size:10px;color:var(--txt2);text-transform:uppercase;letter-spacing:.9px;margin-top:3px}
.hdr-btns{display:flex;gap:6px;flex-shrink:0}
.btn{padding:6px 14px;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;border:none;font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.btn-gold{background:var(--gold);color:#080808}.btn-gold:hover{background:var(--goldL)}
.btn-ghost{background:transparent;border:1px solid var(--bd2);color:var(--txt2)}.btn-ghost:hover{color:var(--txt);border-color:var(--bd3)}
/* Add-new dropdown */
.btn-dd{position:relative}
.add-dd-menu{position:absolute;top:calc(100% + 6px);right:0;background:var(--s1);border:1px solid var(--bd2);border-radius:var(--r2);padding:5px;min-width:164px;z-index:200;box-shadow:0 8px 28px rgba(0,0,0,.5);display:none;animation:fdin .1s ease}
.add-dd-menu.open{display:block}
.add-dd-item{display:flex;align-items:center;gap:9px;width:100%;padding:9px 12px;font-size:13px;font-weight:500;color:var(--txt2);background:none;border:none;border-radius:var(--r);cursor:pointer;font-family:inherit;transition:all .1s;text-align:left;white-space:nowrap}
.add-dd-item:hover{background:var(--s2);color:var(--txt)}
/* Title edit pencil */
.hdr-title-wrap{display:flex;align-items:center;gap:6px;cursor:pointer;min-width:0}
.hdr-title-wrap:hover .hdr-title{color:var(--gold)}
.hdr-title-wrap:hover .edit-pen{opacity:1}
.edit-pen{opacity:0;transition:opacity .15s;flex-shrink:0;color:var(--txt3)}
/* Form validation shake */
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}
.fi.err{border-color:var(--red)!important;animation:shake .35s ease}
/* Phase stub sticky */
.ph-stub{position:sticky;left:0;z-index:14}
/* Phase add button with text */
.ph-add-btn{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:var(--r);font-size:12px;font-weight:500;color:var(--txt2);background:transparent;border:1px dashed var(--bd2);cursor:pointer;font-family:inherit;transition:all .15s}
.ph-add-btn:hover{color:var(--gold);border-color:var(--gold);background:var(--goldB)}
/* Team row label clickable */
.trl{cursor:pointer!important}
.trl:hover{background:var(--s2)!important}
/* Week stub sticky */
.wk-stub{position:sticky;left:0;z-index:14;background:var(--s2)}

/* ── LAYOUT ── */
.body{height:calc(100vh - var(--hdr));display:flex;overflow:hidden}

/* ── SIDEBAR ── */
.sb{width:var(--sb);flex-shrink:0;background:var(--s1);border-right:1px solid var(--bd);display:flex;flex-direction:column}
.sb-hd{padding:12px 14px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.sb-hd h2{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.9px;color:var(--txt)}
.sb-badge{font-size:12px;background:var(--s3);border-radius:10px;padding:2px 8px;color:var(--txt2)}

/* Tags */
.tg-bar{padding:9px 12px;border-bottom:1px solid var(--bd);display:flex;gap:4px;flex-wrap:wrap;flex-shrink:0}
.tf{padding:4px 11px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--bd2);color:var(--txt2);background:transparent;font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;gap:4px;line-height:1.5;user-select:none}
.tf:hover{color:var(--txt);border-color:var(--bd3)}
.tf.on{border-color:var(--gold);color:var(--gold);background:var(--goldD)}
.tf.draggable-tag{cursor:grab}
.tf.draggable-tag:active{cursor:grabbing}
.tf-del{font-size:12px;line-height:1;opacity:0;margin-left:1px;transition:opacity .15s}
.tf:hover .tf-del{opacity:.65}
.tf-add-row{display:flex;gap:4px;width:100%;margin-top:3px}
.tf-add-inp{flex:1;padding:3px 9px;border-radius:20px;border:1px dashed var(--bd2);background:transparent;font-size:12px;color:var(--txt);outline:none;font-family:inherit;min-width:0}
.tf-add-inp:focus{border-color:var(--gold)}
.tf-add-btn{padding:3px 9px;border-radius:20px;border:1px solid var(--gold);background:var(--goldD);color:var(--gold);font-size:12px;cursor:pointer;font-family:inherit}

/* Task list */
.task-list{flex:1;overflow-y:auto;padding:6px}
.tc{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r);padding:10px 12px;margin-bottom:5px;cursor:grab;transition:border-color .15s,box-shadow .15s,outline .1s;position:relative}
.tc:hover{border-color:var(--bd3);box-shadow:0 2px 12px rgba(0,0,0,.3)}
.tc:active{cursor:grabbing}
.tc.drg{opacity:.25}.tc.hid{display:none}
.tc.tag-drop-target{outline:2px solid var(--gold);outline-offset:1px}
.tc-top{display:flex;justify-content:space-between;align-items:flex-start;gap:6px;margin-bottom:6px}
.tc-nm{font-size:14px;font-weight:500;line-height:1.4;flex:1;cursor:pointer}
.tc-nm:hover{color:var(--gold)}
.tc-status{display:flex;gap:3px;align-items:flex-start;flex-shrink:0;padding-top:2px}
.sc-dot{width:7px;height:7px;border-radius:50%;margin-top:2px}
.sc-dot.yes{background:var(--grn)}.sc-dot.no{background:var(--s4);border:1px solid var(--bd2)}
.tc-tags{display:flex;gap:3px;flex-wrap:wrap;align-items:center}
.tag{padding:2px 7px;border-radius:4px;font-size:11px;font-weight:500}
.tc-footer{display:flex;align-items:center;margin-top:7px;gap:6px}
.tc-team{font-size:12px;color:var(--txt2);display:inline-flex;align-items:center;gap:3px}
.tc-team svg{width:12px;height:12px}
.tc-ph{padding:2px 7px;border-radius:4px;font-size:11px;font-weight:600;margin-left:auto;flex-shrink:0}
.dur-b{font-size:12px;color:var(--txt2)}
.no-tasks{padding:24px;text-align:center;color:var(--txt2);font-size:13px}
.sb-foot{padding:8px;border-top:1px solid var(--bd);flex-shrink:0}
.add-tc{width:100%;padding:9px;text-align:center;font-size:13px;background:transparent;border:1px dashed var(--bd2);border-radius:var(--r);color:var(--txt2);cursor:pointer;font-family:inherit;transition:all .15s}
.add-tc:hover{border-color:var(--gold);color:var(--gold)}
/* Search */
.sb-search{padding:8px 10px;border-bottom:1px solid var(--bd);flex-shrink:0;position:relative}
.sb-search-inp{width:100%;background:var(--s2);border:1px solid var(--bd2);border-radius:var(--r);padding:7px 10px 7px 32px;font-size:13px;color:var(--txt);outline:none;font-family:inherit;transition:border-color .15s}
.sb-search-inp:focus{border-color:var(--gold)}
.sb-search-inp::placeholder{color:var(--txt3)}
.sb-search-ico{position:absolute;left:18px;top:50%;transform:translateY(-50%);color:var(--txt3);pointer-events:none}
/* Month label row */
.mo-row{display:flex;height:22px;border-bottom:1px solid var(--bd);background:var(--s1)}
.mo-stub{width:var(--tlw);flex-shrink:0;border-right:1px solid var(--bd);position:sticky;left:0;z-index:14;background:var(--s1)}
.mo-cell{display:flex;align-items:center;padding-left:8px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--txt3);border-right:1px solid var(--bd);overflow:hidden;white-space:nowrap;flex-shrink:0}
/* Phase progress bar */
.ph-prog{position:absolute;bottom:0;left:0;right:0;height:3px;background:rgba(0,0,0,.25)}
.ph-prog-fill{height:100%;background:rgba(255,255,255,.55);transition:width .3s}
/* Empty state */
.empty-state{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:40px;pointer-events:none}
.empty-ico{width:52px;height:52px;border-radius:50%;background:var(--goldD);display:flex;align-items:center;justify-content:center;color:var(--gold)}
.empty-title{font-family:'Crimson Pro',Georgia,serif;font-size:22px;font-weight:600;color:var(--txt);text-align:center}
.empty-sub{font-size:13px;color:var(--txt2);text-align:center;max-width:340px;line-height:1.6}
.empty-actions{display:flex;gap:8px;pointer-events:all;flex-wrap:wrap;justify-content:center}
.empty-btn{padding:9px 18px;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s}
.empty-btn-primary{background:var(--gold);color:#080808;border:none}.empty-btn-primary:hover{background:var(--goldL)}
.empty-btn-sec{background:transparent;border:1px solid var(--bd2);color:var(--txt2)}.empty-btn-sec:hover{color:var(--txt);border-color:var(--bd3)}
/* Stat clickable — reset all button chrome */
button.stat{background:none;border:none;font-family:inherit;color:inherit;cursor:pointer;padding:4px 8px;border-radius:var(--r);transition:background .15s;text-align:center;line-height:inherit}
button.stat:hover{background:var(--s3)}
/* Share button class */
.btn-outline-gold{border:1px solid var(--gold)!important;color:var(--gold)!important}

/* ── TIMELINE ── */
.tl-area{flex:1;overflow:auto;position:relative}
.tl-inner{min-width:max-content}
.tl-hdrs{position:sticky;top:0;z-index:15;background:var(--bg)}

/* Phase row */
.ph-row{display:flex;height:72px;border-bottom:1px solid var(--bd)}
.ph-stub{width:var(--tlw);flex-shrink:0;border-right:1px solid var(--bd);background:var(--s1);display:flex;align-items:center;padding:0 12px;gap:6px}
.ph-stub-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.9px;color:var(--txt2)}
.ico-btn{background:none;border:none;color:var(--txt3);cursor:pointer;font-size:16px;padding:0;line-height:1;transition:color .15s;display:inline-flex;align-items:center}
.ico-btn:hover{color:var(--gold)}
.ph-cells{display:flex}
.ph-cell{height:72px;position:relative;display:flex;align-items:stretch;border-right:2px solid var(--bg);overflow:hidden;user-select:none;transition:filter .15s}
.ph-cell:not(.ph-gap):hover{filter:brightness(1.12)}
.ph-gap{background:var(--s1);border-right:1px solid var(--bd);cursor:default}
.ph-gap:hover{filter:none}
/* Phase resize handles */
.ph-lh,.ph-rh{position:absolute;top:0;bottom:0;width:7px;cursor:ew-resize;background:rgba(255,255,255,.18);opacity:0;transition:opacity .15s;z-index:3}
.ph-lh{left:0;border-radius:3px 0 0 3px}
.ph-rh{right:0;border-radius:0 3px 3px 0}
.ph-cell:not(.ph-gap):hover .ph-lh,.ph-cell:not(.ph-gap):hover .ph-rh{opacity:1}
/* Phase body (drag target) */
.ph-body{flex:1;display:flex;flex-direction:column;justify-content:center;padding:0 14px;min-width:0;cursor:grab}
.ph-body:active{cursor:grabbing}
.ph-body::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.07) 0%,rgba(0,0,0,.14) 100%);pointer-events:none}
.ph-num{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.9px;color:rgba(255,255,255,.7);line-height:1;margin-bottom:3px}
.ph-name{font-family:'Crimson Pro',Georgia,serif;font-size:16px;font-weight:600;color:rgba(255,255,255,.98);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.2;text-shadow:0 1px 4px rgba(0,0,0,.5)}
.ph-dates{font-size:10px;color:rgba(255,255,255,.65);white-space:nowrap;margin-top:2px;overflow:hidden;text-overflow:ellipsis}
/* Phase drag-over highlight */
.ph-cell.ph-drag-over:not(.ph-gap){outline:2px solid rgba(255,255,255,.6);outline-offset:-2px}

/* Week row */
.wk-row{display:flex;height:40px;border-bottom:2px solid var(--bd2);background:var(--s2)}
.wk-stub{width:var(--tlw);flex-shrink:0;border-right:1px solid var(--bd2);font-size:11px;font-weight:500;color:var(--txt2);display:flex;align-items:center;padding:0 12px}
.wk-c{width:var(--ww);flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;border-right:1px solid var(--bd2)}
.wk-c .wn{font-size:12px;font-weight:700;color:var(--txt);line-height:1;letter-spacing:.3px}
.wk-c .wd{font-size:10px;font-weight:500;color:var(--txt3);line-height:1;margin-top:3px}
.wk-c.cur{background:rgba(208,160,82,.06)}
.wk-c.cur .wn{color:var(--gold)}
.wk-c.cur .wd{color:var(--gold);opacity:.75}

/* Team rows */
.tm-rows{position:relative}
.tm-row{display:flex;border-bottom:1px solid var(--bd);position:relative}
.trl{width:var(--tlw);flex-shrink:0;border-right:1px solid var(--bd);background:var(--s1);padding:12px;display:flex;align-items:flex-start;gap:8px;position:sticky;left:0;z-index:5;cursor:context-menu}
.tm-ico{flex-shrink:0;width:22px;height:22px;display:flex;align-items:center;justify-content:center;margin-top:1px}
.tm-ico svg{width:15px;height:15px;stroke-width:1.5}
.tm-nm{font-size:14px;font-weight:600}
.trr{position:relative;display:flex}
.trc{width:var(--ww);flex-shrink:0;border-right:1px solid var(--bd);transition:background .1s}
.trc.dh{background:rgba(208,160,82,.1)!important}
.trc.ph-bg{background:rgba(255,255,255,.014)}

/* Task bars */
.tb{position:absolute;height:34px;border-radius:5px;display:flex;align-items:center;padding:0 8px 0 10px;font-size:13px;font-weight:500;color:rgba(255,255,255,.96);cursor:grab;z-index:3;overflow:hidden;white-space:nowrap;text-shadow:0 1px 3px rgba(0,0,0,.55);transition:box-shadow .15s,opacity .15s;user-select:none}
.tb:hover{box-shadow:0 4px 14px rgba(0,0,0,.5);z-index:4}
.tb:active{cursor:grabbing}
.tb.drg{opacity:.3;z-index:2}
.tb-nm{overflow:hidden;text-overflow:ellipsis;flex:1}
.tb-dur{font-size:11px;opacity:.7;margin-left:5px;flex-shrink:0}
/* Left resize handle */
.tb-lh{position:absolute;left:0;top:0;bottom:0;width:6px;cursor:ew-resize;border-radius:5px 0 0 5px;background:rgba(255,255,255,.18);opacity:0;transition:opacity .15s}
/* Right resize handle */
.tb-rh{position:absolute;right:0;top:0;bottom:0;width:6px;cursor:ew-resize;border-radius:0 5px 5px 0;background:rgba(255,255,255,.18);opacity:0;transition:opacity .15s}
.tb:hover .tb-lh,.tb:hover .tb-rh{opacity:1}

/* Today line */
.today-line{position:absolute;top:0;bottom:0;width:1px;background:var(--red);z-index:8;pointer-events:none;opacity:.5}

/* Filter bar */
.filter-bar{padding:9px 12px;border-bottom:1px solid var(--bd);display:grid;grid-template-columns:1fr 1fr;gap:5px;flex-shrink:0}
.fi-sel{width:100%;background:var(--s2);border:1px solid var(--bd2);border-radius:var(--r);padding:6px 9px;font-size:12px;color:var(--txt);outline:none;font-family:inherit;cursor:pointer}
.fi-sel:focus{border-color:var(--gold);color:var(--txt)}
.fi-sel option{background:var(--s2);color:var(--txt)}

/* Scope & Output rows */
.scope-row,.output-row{display:flex;border-bottom:1px solid var(--bd)}
.row-lbl{width:var(--tlw);flex-shrink:0;border-right:1px solid var(--bd);background:var(--s1);padding:10px 12px;position:sticky;left:0;z-index:5}
.row-lbl h3{font-family:'Crimson Pro',Georgia,serif;font-size:14px;font-weight:600;color:var(--txt);margin-bottom:3px;letter-spacing:.2px}
.row-lbl p{font-size:11px;color:var(--txt2)}
.row-track{display:flex}
.scope-block,.output-block{border-right:1px solid var(--bd);border-left:3px solid;padding:8px;display:flex;flex-direction:column;min-height:90px}
.scope-block textarea{width:100%;background:transparent;border:none;color:var(--txt);font-size:13px;font-family:inherit;resize:none;outline:none;line-height:1.6;min-height:64px;flex:1}
.scope-block textarea::placeholder{color:var(--txt3)}
.scope-gap,.output-gap{border-right:1px solid rgba(28,28,28,.4);background:var(--s1)}
.chk-list{display:flex;flex-direction:column;gap:3px;flex:1}
.chk-item{display:flex;align-items:center;gap:6px;padding:2px 0;border-radius:4px}
.chk-item input[type=checkbox]{accent-color:var(--gold);flex-shrink:0;cursor:pointer;width:14px;height:14px}
.chk-txt{font-size:13px;color:var(--txt2);flex:1;outline:none;background:transparent;border:none;font-family:inherit;cursor:text;caret-color:var(--gold)}
.chk-txt:focus{color:var(--txt)}
.chk-txt.done{text-decoration:line-through;color:var(--txt3)}
.del-chk{background:none;border:none;color:var(--txt3);cursor:pointer;font-size:12px;padding:0 3px;opacity:0;transition:opacity .15s;line-height:1}
.chk-item:hover .del-chk{opacity:.6}
.add-chk{margin-top:6px;width:100%;padding:5px 8px;background:transparent;border:1px dashed var(--bd2);border-radius:var(--r);color:var(--txt2);font-size:12px;cursor:pointer;font-family:inherit;text-align:left;transition:all .15s;flex-shrink:0}
.add-chk:hover{border-color:var(--gold);color:var(--gold)}
.add-tm-row{display:flex;border-bottom:1px solid var(--bd)}
.add-tm-btn{width:var(--tlw);background:var(--s1);border:none;border-right:1px solid var(--bd);padding:11px 12px;color:var(--txt2);font-size:13px;cursor:pointer;text-align:left;font-family:inherit;transition:all .15s;display:flex;align-items:center;gap:6px}
.add-tm-btn:hover{color:var(--gold)}
.sb.dh-zone{background:rgba(208,160,82,.04)}

/* ── MODAL ── */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.82);display:flex;align-items:center;justify-content:center;z-index:50;backdrop-filter:blur(5px);animation:fdin .15s ease}
.mbg:focus{outline:none}
@keyframes fdin{from{opacity:0}to{opacity:1}}
.mdl{background:var(--s1);border:1px solid var(--bd2);border-radius:var(--r2);width:460px;max-width:93vw;padding:24px;max-height:88vh;overflow-y:auto;animation:sup .18s ease}
@keyframes sup{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.mdl h3{font-family:'Crimson Pro',Georgia,serif;font-size:18px;font-weight:600;margin-bottom:18px;color:var(--txt)}
.mdl-sep{height:1px;background:var(--bd);margin:14px 0}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:11px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.fi{width:100%;background:var(--s2);border:1px solid var(--bd2);border-radius:var(--r);padding:8px 11px;font-size:13px;color:var(--txt);outline:none;font-family:inherit}
.fi:focus{border-color:var(--gold)}
select.fi option{background:var(--s2)}
textarea.fi{resize:vertical;min-height:64px;line-height:1.5}
.fg-row{display:flex;gap:10px}.fg-row .fg{flex:1}
.tag-opts{display:flex;gap:5px;flex-wrap:wrap}
.to{padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--bd2);color:var(--txt2);background:transparent;font-family:inherit;transition:all .15s}
.to.sel{border-color:var(--gold);color:var(--gold);background:var(--goldD)}
.col-opts{display:flex;gap:6px;flex-wrap:wrap}
.co{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s}
.co.sel{border-color:var(--txt);transform:scale(1.18)}
.icon-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px}
.ig{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border-radius:var(--r);border:1px solid var(--bd2);cursor:pointer;transition:all .15s;background:transparent;padding:6px}
.ig:hover{border-color:var(--bd3)}.ig.sel{border-color:var(--gold);background:var(--goldD)}
.ig svg{width:16px;height:16px;stroke-width:1.5;color:var(--txt2)}.ig.sel svg{color:var(--gold)}
.ig-lbl{font-size:9px;color:var(--txt2);text-align:center}.ig.sel .ig-lbl{color:var(--gold)}
.mdl-btns{display:flex;gap:7px;justify-content:flex-end;margin-top:18px}
.bsm{padding:8px 16px;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;border:none;font-family:inherit;transition:all .15s}
.b-primary{background:var(--gold);color:#080808}.b-primary:hover{background:var(--goldL)}
.b-sec{background:var(--s3);border:1px solid var(--bd2);color:var(--txt2)}.b-sec:hover{color:var(--txt)}
.b-dng{background:rgba(224,87,87,.12);color:var(--red);border:1px solid rgba(224,87,87,.35)}.b-dng:hover{background:var(--red);color:#fff}
.hlp{font-size:12px;color:var(--txt2);margin-top:5px}

/* ── CTX MENU ── */
.ctx{position:fixed;background:var(--s1);border:1px solid var(--bd2);border-radius:8px;padding:5px;z-index:100;min-width:164px;box-shadow:0 10px 28px rgba(0,0,0,.7);animation:fdin .1s ease}
.ci{padding:8px 12px;font-size:14px;cursor:pointer;border-radius:4px;display:flex;align-items:center;gap:8px;transition:background .1s;color:var(--txt2)}
.ci:hover{background:var(--s2);color:var(--txt)}.ci.dng{color:var(--red)}.ci.dng:hover{background:rgba(224,87,87,.08)}
.ci svg{width:13px;height:13px;flex-shrink:0}
.ci-sep{height:1px;background:var(--bd);margin:3px 5px}

/* Readonly banner */
.ro-banner{height:36px;background:var(--goldD);border-bottom:1px solid rgba(208,160,82,.3);display:flex;align-items:center;padding:0 18px;gap:10px;flex-shrink:0;font-size:12px;color:var(--gold)}
.ro-banner svg{flex-shrink:0;opacity:.8}
.ro-banner span{flex:1}
.ro-link{font-size:12px;font-weight:500;padding:5px 12px;border-radius:var(--r);border:1px solid var(--gold);color:var(--gold);background:transparent;cursor:pointer;font-family:inherit;transition:all .15s;text-decoration:none;display:inline-flex;align-items:center;gap:5px;flex-shrink:0}
.ro-link:hover{background:var(--goldD)}
/* Readonly — disable interactive cursors */
.readonly .tc{cursor:default!important}
.readonly .tc:active{cursor:default!important}
.readonly .tb{cursor:default!important}
.readonly .ph-body{cursor:default!important}
.readonly .tb-lh,.readonly .tb-rh,.readonly .ph-lh,.readonly .ph-rh{display:none!important}
/* Share modal URL box */
.share-url-wrap{display:flex;gap:6px;margin-top:6px}
.share-url{flex:1;background:var(--s3);border:1px solid var(--bd2);border-radius:var(--r);padding:9px 11px;font-size:12px;color:var(--txt2);font-family:inherit;outline:none;cursor:text;word-break:break-all}
.share-copy{padding:9px 14px;border-radius:var(--r);background:var(--gold);color:#080808;border:none;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap;flex-shrink:0}
.share-copy:hover{background:var(--goldL)}
.share-copy.copied{background:var(--grn);color:#fff}
/* ── WEEK PICKER ── */
.wkp{user-select:none;margin-top:4px}
/* Dual date fields */
.wkp-date-row{display:grid;grid-template-columns:1fr auto 1fr;gap:6px;align-items:end;margin-bottom:14px}
.wkp-date-field{padding:9px 11px;border-radius:var(--r);border:1px solid var(--bd2);background:var(--s2);cursor:pointer;transition:all .15s}
.wkp-date-field:hover{border-color:var(--bd3)}
.wkp-date-field.active{border-color:var(--gold);background:var(--goldB)}
.wkp-date-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--txt3);display:block;margin-bottom:5px}
.wkp-date-field.active .wkp-date-lbl{color:var(--gold)}
.wkp-date-inp{background:transparent;border:none;outline:none;font-size:14px;font-weight:500;color:var(--txt);font-family:inherit;width:100%;cursor:pointer}
.wkp-date-inp::placeholder{color:var(--txt3);font-weight:400;font-size:13px}
.wkp-date-arrow{color:var(--txt3);font-size:18px;display:flex;align-items:center;padding-bottom:10px}
/* Month nav */
.wkp-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.wkp-nav-btn{background:none;border:1px solid var(--bd2);border-radius:var(--r);color:var(--txt2);cursor:pointer;padding:4px 12px;font-size:15px;font-family:inherit;transition:all .15s;line-height:1}
.wkp-nav-btn:hover{color:var(--txt);border-color:var(--bd3)}
.wkp-nav-lbl{font-size:14px;font-weight:600;color:var(--txt);cursor:pointer;padding:3px 8px;border-radius:var(--r);transition:all .15s;border:1px solid transparent}
.wkp-nav-lbl:hover{background:var(--s3);border-color:var(--bd2)}
/* Month/year grid */
.wkp-mo-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;padding:4px 0 8px}
.wkp-mo-cell{padding:9px 4px;text-align:center;border-radius:var(--r);cursor:pointer;font-size:13px;color:var(--txt2);transition:all .15s;border:1px solid transparent}
.wkp-mo-cell:hover{background:var(--s3);color:var(--txt)}
.wkp-mo-cell.cur{background:var(--goldD);color:var(--gold);border-color:var(--gold)}
.wkp-yr-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.wkp-yr-lbl{font-size:15px;font-weight:700;color:var(--txt)}
/* Calendar grid */
.wkp-head{display:grid;grid-template-columns:32px repeat(7,1fr);margin-bottom:2px}
.wkp-head span{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--txt3);text-align:center;padding:2px 0}
.wkp-row{display:grid;grid-template-columns:32px repeat(7,1fr);border-radius:5px;cursor:pointer;transition:background .1s;margin:1px 0}
.wkp-row:hover{background:var(--s3)}
.wkp-wn{font-size:10px;font-weight:600;color:var(--txt3);display:flex;align-items:center;padding-left:2px;transition:color .1s}
.wkp-day{font-size:13px;color:var(--txt2);text-align:center;padding:7px 0;line-height:1;transition:all .1s}
.wkp-day.out{opacity:.3}
.wkp-day.today{color:var(--gold);font-weight:700}
.wkp-row.w-start,.wkp-row.w-end{background:var(--goldD)}
.wkp-row.w-start .wkp-wn,.wkp-row.w-end .wkp-wn{color:var(--gold);font-weight:700}
.wkp-row.w-start .wkp-day,.wkp-row.w-end .wkp-day{color:var(--txt);font-weight:500}
.wkp-row.w-start{border-left:3px solid var(--gold)}
.wkp-row.w-end{border-right:3px solid var(--gold)}
.wkp-row.in-range{background:var(--goldB)}
.wkp-row.hov-range{background:rgba(208,160,82,.05)}
.wkp-row.hov-end{background:var(--goldB);border-right:2px dashed var(--gold)}
/* Summary strip */
.wkp-footer{margin-top:12px;padding:10px 12px;background:var(--s2);border:1px solid var(--bd2);border-radius:var(--r)}
.wkp-f1{font-size:14px;font-weight:600;color:var(--txt);margin-bottom:3px}
.wkp-f2{font-size:12px;color:var(--txt2)}

/* ── HOME SCREEN ── */
.home{min-height:100vh;background:var(--bg);display:flex;flex-direction:column;font-family:'Inter',-apple-system,sans-serif}
.home-hdr{padding:18px 40px;display:flex;align-items:center;border-bottom:1px solid var(--bd);background:var(--s1);flex-shrink:0}
.home-hdr-spacer,.home-hdr-actions{flex:1}
.home-hdr-logo{display:flex;justify-content:center;align-items:center}
.home-hdr-logo img{height:56px;width:auto}
[data-theme="light"] .home-hdr-logo img{filter:brightness(.52)}
.home-hdr-actions{display:flex;justify-content:flex-end;align-items:center;gap:8px}
/* card time-elapsed bar */
.proj-tl-dates{display:flex;justify-content:space-between;font-size:10px;color:var(--txt3);margin-bottom:5px}
.proj-elapsed-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.proj-elapsed-lbl{font-size:11px;color:var(--txt3);white-space:nowrap}
.proj-elapsed-val{font-size:11px;font-weight:600;color:var(--txt2)}
.home-body{padding:36px 40px;flex:1;overflow-y:auto}
.home-section-lbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.9px;color:var(--txt3);margin-bottom:16px}
.proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px}
/* Project card */
.proj-card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r2);padding:20px;cursor:pointer;transition:border-color .18s,box-shadow .18s,transform .18s;position:relative;display:flex;flex-direction:column;min-height:180px}
.proj-card:hover{border-color:var(--bd3);box-shadow:0 8px 28px rgba(0,0,0,.35);transform:translateY(-2px)}
.proj-card-stripe{position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--r2) var(--r2) 0 0}
.proj-card-name{font-family:'Crimson Pro',Georgia,serif;font-size:18px;font-weight:600;color:var(--txt);margin-top:10px;margin-bottom:3px;line-height:1.3}
.proj-card-sub{font-size:12px;color:var(--txt2);margin-bottom:14px;line-height:1.5;flex:1}
.proj-card-stats{display:flex;gap:18px;margin-bottom:12px}
.proj-stat{display:flex;flex-direction:column;gap:1px}
.proj-stat-n{font-size:17px;font-weight:700;color:var(--txt);line-height:1}
.proj-stat-l{font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.7px;margin-top:2px}
.proj-tl-wrap{margin-bottom:12px}
.proj-tl-dates{display:flex;justify-content:space-between;font-size:10px;color:var(--txt3);margin-bottom:4px}
.proj-tl-bar{height:4px;background:var(--s4);border-radius:2px;overflow:hidden}
.proj-tl-fill{height:100%;border-radius:2px;min-width:4px;max-width:100%}
.proj-card-footer{display:flex;justify-content:space-between;align-items:center}
.proj-date{font-size:11px;color:var(--txt3)}
.proj-menu{position:relative}
.proj-menu-btn{background:none;border:none;color:var(--txt3);cursor:pointer;padding:5px;border-radius:var(--r);transition:all .15s;display:flex;align-items:center;justify-content:center;line-height:1}
.proj-menu-btn:hover{color:var(--txt);background:var(--s3)}
.proj-ctx{position:absolute;top:calc(100% + 4px);right:0;background:var(--s1);border:1px solid var(--bd2);border-radius:var(--r2);padding:5px;min-width:150px;z-index:50;box-shadow:0 8px 24px rgba(0,0,0,.4);animation:fdin .1s ease}
.proj-ctx-item{display:flex;align-items:center;gap:8px;width:100%;padding:8px 11px;font-size:13px;color:var(--txt2);background:none;border:none;border-radius:var(--r);cursor:pointer;font-family:inherit;transition:all .1s;text-align:left;white-space:nowrap}
.proj-ctx-item:hover{background:var(--s2);color:var(--txt)}
.proj-ctx-item.dng{color:var(--red)}.proj-ctx-item.dng:hover{background:rgba(224,87,87,.08)}
.proj-ctx-sep{height:1px;background:var(--bd);margin:3px 5px}
/* New project card */
.proj-new-card{background:transparent;border:1px dashed var(--bd2);border-radius:var(--r2);padding:20px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;min-height:180px;color:var(--txt3);font-family:inherit}
.proj-new-card:hover{border-color:var(--gold);color:var(--gold);background:var(--goldB)}
.proj-new-ico{width:42px;height:42px;border-radius:50%;border:1.5px dashed currentColor;display:flex;align-items:center;justify-content:center;transition:inherit}
.proj-new-lbl{font-size:13px;font-weight:500}
/* Accent picker */
.proj-accent-grid{display:flex;gap:8px;flex-wrap:wrap}
.proj-accent-swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:all .15s}
.proj-accent-swatch.sel{border-color:var(--txt);transform:scale(1.2)}
/* Breadcrumb in detail */
.breadcrumb{display:flex;align-items:center;gap:7px;min-width:0;flex:1}
.bc-home{display:inline-flex;align-items:center;gap:4px;font-size:13px;color:var(--txt2);cursor:pointer;background:none;border:none;font-family:inherit;padding:3px 6px;border-radius:var(--r);transition:all .15s;white-space:nowrap;flex-shrink:0}
.bc-home:hover{color:var(--gold)}
.bc-sep{color:var(--bd3);font-size:14px;flex-shrink:0}
.bc-cur{font-family:'Crimson Pro',Georgia,serif;font-size:17px;font-weight:600;color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;transition:color .15s}
.bc-cur:hover{color:var(--gold)}
.bc-cur:hover ~ .edit-pen,.bc-cur-wrap:hover .edit-pen{opacity:1}
.bc-cur-wrap{display:flex;align-items:center;gap:5px;min-width:0;cursor:pointer}
/* Home empty */
.home-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:60px;text-align:center}
.home-empty-ico{width:56px;height:56px;border-radius:50%;background:var(--goldD);display:flex;align-items:center;justify-content:center;color:var(--gold)}
.home-empty-title{font-family:'Crimson Pro',Georgia,serif;font-size:24px;font-weight:600;color:var(--txt)}
.home-empty-sub{font-size:13px;color:var(--txt2);max-width:360px;line-height:1.7}
/* export overlay */
.exp-ol{position:fixed;inset:0;background:rgba(0,0,0,.82);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;gap:10px;color:var(--txt2);font-size:12px}
.exp-spin{width:26px;height:26px;border:2px solid var(--bd2);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── IMPORT MODAL ── */
.mdl.mdl-wide{max-width:700px;width:96vw}
.imp-steps{display:flex;align-items:center;margin-bottom:20px}
.imp-step-dot{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:500;color:var(--txt3);white-space:nowrap}
.imp-step-dot.active{color:var(--gold)}
.imp-step-dot.done{color:var(--grn)}
.imp-step-num{width:22px;height:22px;border-radius:50%;border:1.5px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;transition:all .2s}
.imp-step-dot.active .imp-step-num{background:var(--gold);border-color:var(--gold);color:#080808}
.imp-step-dot.done .imp-step-num{background:var(--grn);border-color:var(--grn);color:#fff}
.imp-step-line{flex:1;height:1px;background:var(--bd2);margin:0 10px}
.imp-dropzone{border:1.5px dashed var(--bd2);border-radius:var(--r2);padding:26px 20px;text-align:center;cursor:pointer;transition:all .15s;margin-top:4px}
.imp-dropzone:hover,.imp-dropzone.drag-over{border-color:var(--gold);background:var(--goldB)}
.imp-dropzone-ico{color:var(--txt3);margin-bottom:8px}
.imp-dropzone-lbl{font-size:13px;color:var(--txt2);line-height:1.6}
.imp-dropzone-sub{font-size:11px;color:var(--txt3);margin-top:3px}
.imp-file-chosen{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--s3);border-radius:var(--r);margin-top:6px;font-size:13px}
.imp-file-name{flex:1;color:var(--txt);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.imp-file-clear{background:none;border:none;color:var(--txt3);cursor:pointer;padding:2px 5px;font-size:15px;line-height:1;border-radius:3px}
.imp-file-clear:hover{color:var(--red);background:rgba(224,87,87,.1)}
.imp-tpl-row{display:flex;gap:8px;margin-top:5px}
.imp-tpl-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:9px 12px;border-radius:var(--r);font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s;text-decoration:none}
.imp-tpl-csv{background:var(--s3);border:1px solid var(--bd2);color:var(--txt2)}.imp-tpl-csv:hover{color:var(--txt);border-color:var(--bd3);background:var(--s4)}
.imp-tpl-sheets{background:transparent;border:1px solid var(--bd2);color:var(--txt2)}.imp-tpl-sheets:hover{color:var(--txt);border-color:var(--bd3)}
.imp-mode-row{display:flex;gap:8px;margin-top:6px}
.imp-mode-btn{flex:1;padding:10px 14px;border-radius:var(--r);font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--bd2);color:var(--txt2);background:var(--s2);font-family:inherit;transition:all .15s;text-align:left;line-height:1.4}
.imp-mode-btn.sel{border-color:var(--gold);color:var(--gold);background:var(--goldD)}
.imp-mode-replace.sel{border-color:var(--red)!important;color:var(--red)!important;background:rgba(224,87,87,.07)!important}
.imp-mode-warn{font-size:11px;color:var(--red);margin-top:5px;padding:7px 10px;background:rgba(224,87,87,.07);border-radius:var(--r);display:none}
.imp-mode-warn.show{display:block}
.imp-struct-err{background:rgba(224,87,87,.07);border:1px solid rgba(224,87,87,.25);border-radius:var(--r);padding:12px 14px;font-size:13px;color:var(--red);margin-top:8px;display:flex;gap:10px;align-items:flex-start;line-height:1.5}
.imp-preview-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.imp-preview-summary{font-size:13px;color:var(--txt2)}
.imp-preview-summary b{color:var(--txt)}
.imp-preview-summary .err-c{color:var(--red)}
.imp-back-btn{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--txt3);cursor:pointer;background:none;border:1px solid var(--bd2);font-family:inherit;padding:5px 10px;border-radius:var(--r);transition:all .15s}
.imp-back-btn:hover{color:var(--txt);border-color:var(--bd3)}
.imp-table-wrap{overflow:auto;max-height:280px;border:1px solid var(--bd);border-radius:var(--r)}
.imp-tbl{width:100%;border-collapse:collapse;font-size:12px}
.imp-tbl th{background:var(--s2);padding:7px 10px;text-align:left;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--txt3);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:2;white-space:nowrap}
.imp-tbl td{padding:7px 10px;border-bottom:1px solid var(--bd);color:var(--txt2);vertical-align:middle;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.imp-tbl td:first-child{width:30px;text-align:center;padding:0 8px}
.imp-tbl tr:last-child td{border-bottom:none}
.imp-tbl tr.row-err td{background:rgba(224,87,87,.05);color:var(--red)!important;opacity:.85}
.imp-tbl tr.row-skip td:not(:first-child){opacity:.35}
.imp-err-tag{display:inline-block;font-size:10px;color:var(--red);background:rgba(224,87,87,.12);padding:1px 5px;border-radius:3px;margin-left:4px;white-space:nowrap;vertical-align:middle}
.imp-badge-bl{display:inline-block;font-size:10px;color:var(--txt3);background:var(--s3);padding:1px 5px;border-radius:3px}
/* toast */
.imp-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--s1);border:1px solid var(--bd2);border-radius:var(--r2);padding:10px 18px;font-size:13px;color:var(--txt);box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:300;animation:fdin .2s ease;white-space:nowrap;pointer-events:none}
@keyframes fdin{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
</style>
</head>

/* ══════════════════════════════
   THEME
══════════════════════════════ */
const THEME_KEY = 'roadmap-theme';

function getSystemTheme() {
  return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
}
function getCurrentThemePref() {
  return localStorage.getItem(THEME_KEY) || 'dark';
}
function applyTheme(pref) {
  const actual = pref === 'system' ? getSystemTheme() : pref;
  document.documentElement.dataset.theme = actual;
}
function setTheme(pref) {
  localStorage.setItem(THEME_KEY, pref);
  applyTheme(pref);
  render();
}
function loadTheme() {
  applyTheme(getCurrentThemePref());
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
    if (getCurrentThemePref() === 'system') applyTheme('system');
  });
}

/* ══════════════════════════════
   SHARE (URL-encoded state)
══════════════════════════════ */
const SHARE_PREFIX = '#v1=';

function buildShareURL() {
  const data = {
    cfg: S.cfg, phases: S.phases, teams: S.teams,
    tasks: S.tasks, tags: S.tags, _nextId: S._nextId,
  };
  const compressed = LZString.compressToEncodedURIComponent(JSON.stringify(data));
  return location.origin + location.pathname + SHARE_PREFIX + compressed;
}

function loadFromHash() {
  const hash = location.hash;
  if (!hash.startsWith(SHARE_PREFIX)) return false;
  if (typeof LZString === 'undefined') return false; // CDN guard
  try {
    const json = LZString.decompressFromEncodedURIComponent(hash.slice(SHARE_PREFIX.length));
    if (!json) return false;
    const d = JSON.parse(json);
    if (d.cfg)     S.cfg     = {...S.cfg, ...d.cfg};
    if (d.phases)  S.phases  = d.phases;
    if (d.teams)   S.teams   = d.teams;
    if (d.tasks)   S.tasks   = d.tasks;
    if (d.tags)    S.tags    = d.tags;
    if (d._nextId) S._nextId = d._nextId;
    S.ui.readonly = true;
    return true;
  } catch(e) { return false; }
}

function wkpMonday(date) {

  d.setDate(d.getDate() + 3 - (d.getDay() + 6) % 7);
  const jan4 = new Date(d.getFullYear(), 0, 4);
  return 1 + Math.round(((d - jan4) / 86400000 - 3 + (jan4.getDay() + 6) % 7) / 7);
}

function dateStrYMD(date) {
  return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
}

function fmtWkpDate(date) {
  const mo = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${String(date.getDate()).padStart(2,'0')} ${mo[date.getMonth()]} ${date.getFullYear()}`;
}

function fmtInput(date) {
  if (!date) return '';
  return `${String(date.getDate()).padStart(2,'0')}/${String(date.getMonth()+1).padStart(2,'0')}/${date.getFullYear()}`;
}

function buildWkPicker() {
  const { yr, mo, startMon, endMon, step } = wkp;
  const today = new Date(); today.setHours(0,0,0,0);
  const startTs = startMon ? startMon.getTime() : null;
  const endTs   = endMon   ? endMon.getTime()   : null;

  // Calendar rows
  let cursor = wkpMonday(new Date(yr, mo, 1));
  const lastDay = new Date(yr, mo + 1, 0);
  const weeks = [];
  while (cursor <= lastDay) {
    const mon = new Date(cursor);
    const days = Array.from({length:7}, () => { const d = new Date(cursor); cursor.setDate(cursor.getDate()+1); return d; });
    weeks.push({mon, days});
  }
  const rows = weeks.map(({mon, days}) => {
    const monTs = mon.getTime();
    let cls = 'wkp-row';
    if (startTs && monTs === startTs) cls += ' w-start';
    if (endTs   && monTs === endTs)   cls += ' w-end';
    if (startTs && endTs && monTs > startTs && monTs < endTs) cls += ' in-range';
    const dayCells = days.map(d => {
      let dc = 'wkp-day';
      if (d.getMonth() !== mo) dc += ' out';
      if (d.getTime() === today.getTime()) dc += ' today';
      return `<span class="${dc}">${d.getDate()}</span>`;
    }).join('');
    return `<div class="${cls}" data-wmon="${dateStrYMD(mon)}"><span class="wkp-wn">W${isoWeek(mon)}</span>${dayCells}</div>`;
  }).join('');

  // Summary footer
  let footer = '';
  if (startTs && endTs) {
    const totalWks = Math.round((endTs - startTs) / (7*86400000)) + 1;
    footer = `<div class="wkp-footer">
      <div class="wkp-f1">W${isoWeek(startMon)} → W${isoWeek(endMon)} · ${totalWks} tuần</div>
      <div class="wkp-f2">${fmtWkpDate(startMon)} – ${fmtWkpDate(new Date(endTs + 6*86400000))}</div>
    </div>`;
  }

  // Start/end value to show in date fields
  const startVal = startMon ? fmtInput(startMon) : '';
  const endVal   = endMon   ? fmtInput(new Date(endTs + 6*86400000)) : '';

  const MO_ABBR = ['T1','T2','T3','T4','T5','T6','T7','T8','T9','T10','T11','T12'];
  const calBody = wkp.showMonthSel ? `
    <div class="wkp-yr-nav">
      <button class="wkp-nav-btn" id="wkp-yr-prev">‹</button>
      <span class="wkp-yr-lbl">${yr}</span>
      <button class="wkp-nav-btn" id="wkp-yr-next">›</button>
    </div>
    <div class="wkp-mo-grid">
      ${MO_ABBR.map((m,i)=>`<div class="wkp-mo-cell${i===mo?' cur':''}" data-wmo="${i}">${m}</div>`).join('')}
    </div>` : `
    <div class="wkp-head"><span></span>${WKP_DAYS.map(d=>`<span>${d}</span>`).join('')}</div>
    <div id="wkp-rows">${rows}</div>
    ${footer}`;

  return `<div class="wkp">
    <div class="wkp-date-row">
      <div class="wkp-date-field${step==='start'?' active':''}" id="wkp-field-start">
        <span class="wkp-date-lbl">Bắt đầu</span>
        <input class="wkp-date-inp" id="wkp-inp-start" placeholder="dd/mm/yyyy" maxlength="10" autocomplete="off" value="${startVal}"/>
      </div>
      <div class="wkp-date-arrow">→</div>
      <div class="wkp-date-field${step==='end'?' active':''}" id="wkp-field-end">
        <span class="wkp-date-lbl">Kết thúc</span>
        <input class="wkp-date-inp" id="wkp-inp-end" placeholder="dd/mm/yyyy" maxlength="10" autocomplete="off" value="${endVal}"/>
      </div>
    </div>
    <div class="wkp-nav">
      ${wkp.showMonthSel ? '<span></span>' : `<button class="wkp-nav-btn" id="wkp-prev">‹</button>`}
      <span class="wkp-nav-lbl" id="wkp-mo-lbl">${WKP_MONTHS[mo]} ${yr}</span>
      ${wkp.showMonthSel ? '<span></span>' : `<button class="wkp-nav-btn" id="wkp-next">›</button>`}
    </div>
    ${calBody}
  </div>`;
}

function wkpNav(dir) {
  wkp.mo += dir;
  if (wkp.mo > 11) { wkp.mo = 0; wkp.yr++; }
  if (wkp.mo < 0)  { wkp.mo = 11; wkp.yr--; }
  wkpRefresh();
}

function wkpClick(monStr) {
  const mon = parseDate(monStr);
  if (wkp.step === 'start' || !wkp.startMon) {
    wkp.startMon = mon;
    if (!wkp.endMon || mon.getTime() >= wkp.endMon.getTime()) wkp.endMon = null;
    wkp.step = 'end';
  } else {
    if (mon.getTime() < wkp.startMon.getTime()) {
      wkp.endMon = new Date(wkp.startMon); wkp.startMon = mon;
    } else {
      wkp.endMon = mon;
    }
    wkp.step = 'start';
  }
  wkpRefresh();
}

function wkpRefresh() {
  const el = q('.wkp');
  if (!el) { render(); return; }
  const tmp = document.createElement('div');
  tmp.innerHTML = buildWkPicker();
  el.replaceWith(tmp.firstElementChild);
  bindWkPickerEvents();
}

function bindWkPickerEvents() {
  // Month label → toggle month selector
  q('#wkp-mo-lbl')?.addEventListener('click', () => { wkp.showMonthSel = !wkp.showMonthSel; wkpRefresh(); });
  // Month cells + year nav
  qAll('.wkp-mo-cell').forEach(cell => {
    cell.addEventListener('click', () => { wkp.mo = +cell.dataset.wmo; wkp.showMonthSel = false; wkpRefresh(); });
  });
  q('#wkp-yr-prev')?.addEventListener('click', () => { wkp.yr--; wkpRefresh(); });
  q('#wkp-yr-next')?.addEventListener('click', () => { wkp.yr++; wkpRefresh(); });
  // Prev/next month
  q('#wkp-prev')?.addEventListener('click', () => wkpNav(-1));
  q('#wkp-next')?.addEventListener('click', () => wkpNav(1));

  // Date field clicks → activate that field
  q('#wkp-field-start')?.addEventListener('click', () => { wkp.step = 'start'; wkpRefresh(); q('#wkp-inp-start')?.focus(); });
  q('#wkp-field-end')?.addEventListener('click',   () => { wkp.step = 'end';   wkpRefresh(); q('#wkp-inp-end')?.focus(); });

  // Manual date inputs
  ['start','end'].forEach(side => {
    const inp = q(`#wkp-inp-${side}`);
    if (!inp) return;
    inp.addEventListener('focus', () => { wkp.step = side; wkpRefresh(); q(`#wkp-inp-${side}`)?.focus(); });
    inp.addEventListener('input', () => {
      let v = inp.value.replace(/\D/g,'');
      if (v.length > 2) v = v.slice(0,2) + '/' + v.slice(2);
      if (v.length > 5) v = v.slice(0,5) + '/' + v.slice(5,9);
      inp.value = v;
    });
    inp.addEventListener('keydown', e => {
      if (e.key !== 'Enter' && e.key !== 'Tab') return;
      const parts = inp.value.trim().split('/');
      if (parts.length !== 3) return;
      const [d, m, y] = parts.map(Number);
      if (!d || !m || !y || y < 2000 || y > 2099) return;
      const date = new Date(y, m - 1, d);
      if (isNaN(date.getTime())) return;
      const mon = wkpMonday(date);
      wkp.yr = mon.getFullYear();
      wkp.mo = mon.getMonth();
      if (side === 'start') { wkp.startMon = mon; wkp.step = 'end'; }
      else                  { wkp.endMon   = mon; wkp.step = 'start'; }
      e.preventDefault();
      wkpRefresh();
    });
  });

  // Week row click + hover preview
  qAll('.wkp-row').forEach(row => {
    row.addEventListener('click', () => wkpClick(row.dataset.wmon));
    row.addEventListener('mouseenter', () => {
      if (wkp.step !== 'end' || !wkp.startMon) return;
      const hovTs = parseDate(row.dataset.wmon).getTime();
      const startTs = wkp.startMon.getTime();
      qAll('.wkp-row').forEach(r => {
        const rTs = parseDate(r.dataset.wmon).getTime();
        r.classList.toggle('hov-range', rTs > startTs && rTs < hovTs);
        r.classList.toggle('hov-end',   rTs === hovTs);
      });
    });
  });
  q('#wkp-rows')?.addEventListener('mouseleave', () => {
    qAll('.wkp-row').forEach(r => r.classList.remove('hov-range','hov-end'));
  });
}

   UNDO / REDO
══════════════════════════════ */
const HISTORY_MAX = 50;
let _history = [], _histIdx = -1;

function snapshotState() {
  return JSON.stringify({ phases:S.phases, teams:S.teams, tasks:S.tasks, tags:S.tags, _nextId:S._nextId });
}

function pushHistory() {
  _history = _history.slice(0, _histIdx + 1);
  _history.push(snapshotState());
  if (_history.length > HISTORY_MAX) _history.shift();
  _histIdx = _history.length - 1;
}

function applySnapshot(snap) {
  const d = JSON.parse(snap);
  S.phases = d.phases; S.teams = d.teams; S.tasks = d.tasks;
  S.tags = d.tags; S._nextId = d._nextId;
}

function undo() {
  if (_histIdx <= 0) return;
  _histIdx--;
  applySnapshot(_history[_histIdx]);
  render();
}

function redo() {
  if (_histIdx >= _history.length - 1) return;
  _histIdx++;
  applySnapshot(_history[_histIdx]);
  render();
}

/* ══════════════════════════════
   DATE & WEEK HELPERS
══════════════════════════════ */
let WW = 64;
const TLW = 204, WW_FILL_COLS = 12;

function calcWW() {
  const sbW = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--sb')) || 288;
  const available = window.innerWidth - sbW - TLW - 4;
  const cols = Math.min(totalWeeks(), WW_FILL_COLS);
  return Math.floor(available / cols);
}
const BAR_H = 34, LANE_PAD = 10, LANE_GAP = 6;

function parseDate(s) {
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m-1, d);
}

function startMonday(dateStr) {
  const d = parseDate(dateStr);
  const dow = d.getDay(); // 0=Sun
  const diff = dow === 0 ? -6 : 1 - dow;
  d.setDate(d.getDate() + diff);
  return d;
}

function totalWeeks() {
  const s = startMonday(S.cfg.start);
  const e = parseDate(S.cfg.end);
  return Math.max(1, Math.ceil((e - s) / (7 * 86400000)) + 1);
}

function weekDate(w) {
  const s = startMonday(S.cfg.start);
  s.setDate(s.getDate() + (w - 1) * 7);
  return s;
}

function weekLabel(w) {
  const d = weekDate(w);
  return d.toLocaleDateString('vi-VN', {month:'numeric', day:'numeric'});
}

function todayWeekFrac() {
  const s = startMonday(S.cfg.start);
  const now = new Date();
  return (now - s) / (7 * 86400000) + 1;
}

function phaseAt(w) {
  return S.phases.find(p => w >= p.startWeek && w <= p.endWeek) || null;
}

function teamById(id)  { return S.teams.find(t => t.id === id); }
function taskById(id)  { return S.tasks.find(t => t.id === id); }
function phaseById(id) { return S.phases.find(p => p.id === id); }

function nextId() { return S._nextId++; }

/* ── Timeline ── */
function buildTimeline() {
  const tw = totalWeeks();
  const twFrac = todayWeekFrac();

  /* Phase row */
  const sortedPhases = [...S.phases].sort((a,b) => a.startWeek - b.startWeek);
  let phCells = '';
  let w = 1;
  while (w <= tw) {
    const ph = phaseAt(w);
    if (ph) {
      const span = Math.min(ph.endWeek, tw) - ph.startWeek + 1;
      const phIdx = sortedPhases.findIndex(p => p.id === ph.id);
      const phTasks = S.tasks.filter(t => t.phaseId === ph.id);
      const phDone  = phTasks.filter(t => t.startWeek !== null).length;
      const phPct   = phTasks.length ? Math.round(phDone / phTasks.length * 100) : 0;
      phCells += `<div class="ph-cell" style="width:${span*WW}px;background:${ph.color}" data-phase-id="${ph.id}">
        <div class="ph-lh" data-ph-resize-left="${ph.id}" aria-label="Kéo để thay đổi ngày bắt đầu phase" role="separator"></div>
        <div class="ph-body" draggable="true" data-ph-drag="${ph.id}">
          <div class="ph-num">Phase ${phIdx + 1}</div>
          <div class="ph-name">${esc(ph.name)}</div>
          <div class="ph-dates">W${ph.startWeek}–${ph.endWeek} · ${weekLabel(ph.startWeek)} → ${weekLabel(ph.endWeek)}</div>
        </div>
        <div class="ph-rh" data-ph-resize-right="${ph.id}" aria-label="Kéo để thay đổi ngày kết thúc phase" role="separator"></div>
        ${phTasks.length ? `<div class="ph-prog" aria-label="${phPct}% tasks đã xếp lịch"><div class="ph-prog-fill" style="width:${phPct}%"></div></div>` : ''}
      </div>`;
      w = ph.endWeek + 1;
    } else {
      phCells += `<div class="ph-cell ph-gap" style="width:${WW}px"></div>`;
      w++;
    }
  }

  /* Month label row */
  const MO_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  let moCells = '';
  let prevMo = -1;
  for (let i = 1; i <= tw; i++) {
    const d = weekDate(i);
    const mo = d.getMonth();
    if (mo !== prevMo) {
      // Count how many weeks this month spans
      let span = 0;
      for (let j = i; j <= tw; j++) {
        if (weekDate(j).getMonth() === mo) span++; else break;
      }
      moCells += `<div class="mo-cell" style="width:${span*WW}px">${MO_SHORT[mo]} ${d.getFullYear()}</div>`;
      prevMo = mo;
    }
  }

  /* Week row */
  let wkCells = '';
  for (let i = 1; i <= tw; i++) {
    const isCur = Math.floor(twFrac) === i;
    wkCells += `<div class="wk-c${isCur?' cur':''}">
      <span class="wn">W${i}</span>
      <span class="wd">${weekLabel(i)}</span>
    </div>`;
  }

  /* Team rows */
  const teamRows = S.teams.map(tm => buildTeamRow(tm, tw, twFrac)).join('');

  /* Today line offset */
  const todayLeft = (twFrac - 1) * WW;
  const todayInRange = twFrac >= 1 && twFrac <= tw + 1;

  /* Scope row */
  let scopeTrack = '';
  let sv = 1;
  while (sv <= tw) {
    const ph = phaseAt(sv);
    if (ph) {
      const span = Math.min(ph.endWeek, tw) - ph.startWeek + 1;
      scopeTrack += `<div class="scope-block" style="width:${span*WW}px;border-left-color:${ph.color}">
        <textarea placeholder="Mô tả phạm vi phase..." data-scope-id="${ph.id}">${esc(ph.scope||'')}</textarea>
      </div>`;
      sv = ph.endWeek + 1;
    } else {
      scopeTrack += `<div class="scope-gap" style="width:${WW}px;min-height:90px"></div>`;
      sv++;
    }
  }

  /* Output row */
  let outTrack = '';
  let ov = 1;
  while (ov <= tw) {
    const ph = phaseAt(ov);
    if (ph) {
      const span = Math.min(ph.endWeek, tw) - ph.startWeek + 1;
      const items = (ph.outputs||[]).map(o => `
        <div class="chk-item" data-chk-id="${o.id}" data-chk-ph="${ph.id}">
          <input type="checkbox" ${o.done?'checked':''} data-chk-toggle="${o.id}:${ph.id}"/>
          <span class="chk-txt${o.done?' done':''}" contenteditable="true" data-chk-edit="${o.id}:${ph.id}">${esc(o.text)}</span>
          <button class="del-chk" data-del-chk="${o.id}:${ph.id}">×</button>
        </div>`).join('');
      outTrack += `<div class="output-block" style="width:${span*WW}px;border-left-color:${ph.color}">
        <div class="chk-list">${items}</div>
        <button class="add-chk" data-add-chk="${ph.id}">＋ Thêm output</button>
      </div>`;
      ov = ph.endWeek + 1;
    } else {
      outTrack += `<div class="output-gap" style="width:${WW}px;min-height:90px"></div>`;
      ov++;
    }
  }

  const isEmpty = S.phases.length === 0 && S.teams.length === 0;

  return `

  <div class="tl-inner" id="tl-inner">
    <div class="tl-hdrs">

            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Thêm Phase
          </button>
        </div>
        <div class="ph-cells">${phCells}</div>
      </div>
      <div class="mo-row">
        <div class="mo-stub"></div>
        ${moCells}
      </div>
      <div class="wk-row">
        <div class="wk-stub">Tuần / Ngày</div>
        ${wkCells}
      </div>
    </div>
    <div class="tm-rows" id="tm-rows">
      ${teamRows}
      <div class="add-tm-row">
        <button class="add-tm-btn" id="add-tm-btn2">＋ Thêm nhóm</button>
        <div style="flex:1;background:var(--bg)"></div>
      </div>
    </div>
    <div class="scope-row">
      <div class="row-lbl">
        <h3>Phase Scope</h3>
        <p>Phạm vi &amp; mục tiêu</p>
      </div>
      <div class="row-track">${scopeTrack}</div>
    </div>
    <div class="output-row">
      <div class="row-lbl">
        <h3>Output</h3>
        <p>Checklist đầu ra</p>
      </div>
      <div class="row-track">${outTrack}</div>
    </div>
    ${isEmpty ? `<div class="empty-state" role="status">
      <div class="empty-ico" aria-hidden="true">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="14" x2="8" y2="14"/><line x1="12" y1="14" x2="16" y2="14"/></svg>
      </div>
      <div class="empty-title">Bắt đầu roadmap của bạn</div>
      <div class="empty-sub">Thêm Phase để xác định giai đoạn, sau đó tạo Nhóm và kéo Tasks vào timeline.</div>
      <div class="empty-actions">
        <button class="empty-btn empty-btn-primary" id="empty-add-phase">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Tạo Phase đầu tiên
        </button>
        <button class="empty-btn empty-btn-sec" id="empty-load-sample">Xem ví dụ mẫu</button>
      </div>
    </div>` : ''}
  </div>
</div>`;
}

/* ── Phase algorithms ── */
function pushPhasesAfter(phaseId, minStart) {
  const sorted = [...S.phases].sort((a,b) => a.startWeek - b.startWeek);
  const idx = sorted.findIndex(p => p.id === phaseId);
  let cursor = minStart;
  for (let i = idx + 1; i < sorted.length; i++) {
    const ph = S.phases.find(p => p.id === sorted[i].id);
    if (ph && ph.startWeek < cursor) {
      const span = ph.endWeek - ph.startWeek;
      ph.startWeek = cursor;
      ph.endWeek   = cursor + span;
      cursor = ph.endWeek + 1;
    }
  }
}

function swapPhases(idA, idB) {
  const a = phaseById(idA), b = phaseById(idB);
  if (!a || !b) return;
  [a.startWeek, b.startWeek] = [b.startWeek, a.startWeek];
  [a.endWeek,   b.endWeek  ] = [b.endWeek,   a.endWeek  ];
}

/* ── RAF-throttled render (for drag/resize) ── */
let _rafId = null;
function renderRAF() {
  if (_rafId) cancelAnimationFrame(_rafId);
  _rafId = requestAnimationFrame(() => { _rafId = null; render(true); });
}

/* ── Multi-lane algorithm ── */
function assignLanes(tasks) {
  const sorted = [...tasks].sort((a,b) => a.startWeek - b.startWeek);
  const laneEnds = []; // laneEnds[i] = endWeek of last task in lane i
  const result = {};
  for (const t of sorted) {
    let placed = false;
    for (let i = 0; i < laneEnds.length; i++) {
      if (t.startWeek > laneEnds[i]) {
        laneEnds[i] = t.startWeek + t.dur - 1;
        result[t.id] = i;
        placed = true;
        break;
      }
    }
    if (!placed) {
      result[t.id] = laneEnds.length;
      laneEnds.push(t.startWeek + t.dur - 1);
    }
  }
  return { assignments: result, numLanes: Math.max(laneEnds.length, 1) };
}

function buildTeamRow(tm, tw, twFrac) {
  const tasks = S.tasks.filter(t => t.teamId === tm.id && t.startWeek !== null);
  const todayLeft = (twFrac - 1) * WW;
  const todayInRange = twFrac >= 1 && twFrac <= tw + 1;

  const { assignments, numLanes } = assignLanes(tasks);
  const rowH = LANE_PAD * 2 + numLanes * BAR_H + Math.max(0, numLanes - 1) * LANE_GAP;

  let cells = '';
  for (let i = 1; i <= tw; i++) {
    const ph = phaseAt(i);
    cells += `<div class="trc${ph?' ph-bg':''}" style="height:${rowH}px" data-week="${i}" data-team="${tm.id}"></div>`;
  }

  const bars = tasks.map(t => {
    const lane = assignments[t.id] ?? 0;
    const top  = LANE_PAD + lane * (BAR_H + LANE_GAP);
    const left  = (t.startWeek - 1) * WW;
    const width = Math.max(t.dur * WW - 3, WW - 3);
    const color = tm.color || '#D0A052';
    const ph = t.phaseId ? phaseById(t.phaseId) : null;
    return `<div class="tb" draggable="true" data-task-id="${t.id}"
      style="left:${left}px;top:${top}px;width:${width}px;background:${color}cc;border-left:3px solid ${color}"
      title="${esc(t.name)}${ph?' · '+esc(ph.name):''}">
      <div class="tb-lh" data-resize-left="${t.id}" aria-label="Kéo để thay đổi ngày bắt đầu" role="separator"></div>
      <span class="tb-nm">${esc(t.name)}</span>${t.dur >= 2 ? `<span class="tb-dur">${t.dur}w</span>` : ''}
      <div class="tb-rh" data-resize="${t.id}" aria-label="Kéo để thay đổi thời lượng" role="separator"></div>
    </div>`;
  }).join('');

  const todayLine = todayInRange
    ? `<div class="today-line" style="left:${todayLeft}px;height:${rowH}px"></div>` : '';

  return `
<div class="tm-row" data-team-id="${tm.id}" style="min-height:${rowH}px">
  <div class="trl" data-team-id="${tm.id}" data-team-ctx="${tm.id}" style="min-height:${rowH}px">
    <div class="tm-ico" style="color:${tm.color||'var(--gold)'}">${svgIcon(tm.icon||'layers',15)}</div>
    <span class="tm-nm">${esc(tm.name)}</span>
  </div>
  <div class="trr" data-team="${tm.id}" style="height:${rowH}px">
    ${cells}${todayLine}${bars}
  </div>
</div>`;
}

function bindHome() {
  /* New project buttons */
  const openNew = () => { S.ui.modal = {type:'new-project', data:{}}; renderHome(); };
  q('#home-new-btn')?.addEventListener('click', openNew);
  q('#home-new-hdr-btn')?.addEventListener('click', openNew);

  /* Import CSV button */
  q('#home-import-btn')?.addEventListener('click', () => openImportModal(null));

  /* Card click → open project */
  qAll('.proj-card[data-proj-id]').forEach(card => {
    card.addEventListener('click', e => {
      if (e.target.closest('[data-proj-menu],[data-proj-open],[data-proj-rename],[data-proj-dup],[data-proj-del],.proj-ctx')) return;
      location.hash = '#project-' + card.dataset.projId;
    });
  });

  /* Card context menu toggle */
  qAll('[data-proj-menu]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      homeCtxId = homeCtxId === btn.dataset.projMenu ? null : btn.dataset.projMenu;
      renderHome();
    });
  });

  /* Context menu actions */
  qAll('[data-proj-open]').forEach(b => b.addEventListener('click', e => {
    e.stopPropagation(); location.hash = '#project-' + b.dataset.projOpen;
  }));
  qAll('[data-proj-rename]').forEach(b => b.addEventListener('click', e => {
    e.stopPropagation();
    const p = loadIndex().find(x => x.id === b.dataset.projRename);
    homeCtxId = null;
    S.ui.modal = { type:'rename-project', data:{id:p.id, name:p.name, subtitle:p.subtitle||'', accent:p.accent||'#D0A052'} };
    renderHome();
  }));
  qAll('[data-proj-dup]').forEach(b => b.addEventListener('click', e => {
    e.stopPropagation(); homeCtxId = null; duplicateProject(b.dataset.projDup);
  }));
  qAll('[data-proj-del]').forEach(b => b.addEventListener('click', e => {
    e.stopPropagation(); homeCtxId = null;
    if (confirm('Xóa project này? Hành động không thể hoàn tác.')) deleteProject(b.dataset.projDel);
    else renderHome();
  }));

  /* Close ctx when clicking outside */
  if (homeCtxId) document.addEventListener('click', () => { homeCtxId = null; renderHome(); }, {once:true});

  /* Theme toggle */
  q('#home-theme-btn')?.addEventListener('click', () => {
    const cur = getCurrentThemePref();
    setTheme(cur === 'dark' ? 'light' : cur === 'light' ? 'system' : 'dark');
    renderHome();
  });

  /* Modal */
  const bg = q('#modal-bg');
  if (!bg) return;
  bg.addEventListener('click', e => { if (e.target === bg) { S.ui.modal=null; renderHome(); } });
  q('#m-cancel')?.addEventListener('click', () => { S.ui.modal=null; renderHome(); });

  /* Accent swatches */
  qAll('.proj-accent-swatch').forEach(sw => {
    sw.addEventListener('click', () => {
      qAll('.proj-accent-swatch').forEach(s => s.classList.remove('sel'));
      sw.classList.add('sel');
    });
  });

  /* Auto-focus name input */
  setTimeout(() => q('#hm-name')?.focus(), 50);

  /* Save */
  q('#m-save')?.addEventListener('click', () => {
    const name = q('#hm-name')?.value.trim();
    if (!name) { shakeErr(q('#hm-name')); return; }
    const sub = q('#hm-sub')?.value.trim() || '';
    const type = S.ui.modal?.type;
    if (type === 'new-project') {
      const accent = q('.proj-accent-swatch.sel')?.dataset.acc || '#D0A052';
      S.ui.modal = null;
      createProject(name, sub, accent); // navigates to project
    } else if (type === 'rename-project') {
      const id = S.ui.modal.data.id;
      const accent = q('.proj-accent-swatch.sel')?.dataset.acc || S.ui.modal.data.accent || '#D0A052';
      S.ui.modal = null;
      renameProject(id, name, sub, accent);
    }
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { S.ui.modal=null; homeCtxId=null; renderHome(); }
    if (e.key === 'Enter' && S.ui.modal && e.target.tagName !== 'TEXTAREA') q('#m-save')?.click();
  }, {once:true});

  // Import modal bind (runs on top of or instead of normal modal bind)
  if (S.ui.modal?.type === 'import') bindImportModal();
}

    ).join('')}

}

/* ══════════════════════════════
   BIND EVENTS
══════════════════════════════ */
function bind() {
  /* Back to Home */
  q('#btn-back-home')?.addEventListener('click', () => { location.hash = '#home'; });

  /* Header */
  q('#hdr-title-click')?.addEventListener('click', () => openModal('cfg'));
  q('#btn-cfg')?.addEventListener('click', () => openModal('cfg'));
  q('#btn-share')?.addEventListener('click', () => openModal('share'));
  q('#btn-add-phase2')?.addEventListener('click', () => openModal('add-phase'));
  q('#add-tc-btn')?.addEventListener('click', () => openModal('add-task'));
  q('#add-tm-btn2')?.addEventListener('click', () => openModal('add-team'));
  q('#btn-export')?.addEventListener('click', exportPDF);

  /* Stat buttons → filter */
  q('#stat-all')?.addEventListener('click',   () => { S.ui.filter.status=''; render(); });
  q('#stat-sched')?.addEventListener('click', () => { S.ui.filter.status='scheduled'; render(); });
  q('#stat-back')?.addEventListener('click',  () => { S.ui.filter.status='backlog'; render(); });

  /* Search */
  q('#sb-search')?.addEventListener('input', e => { S.ui.filter.search = e.target.value; render(true); });
  q('#sb-search')?.addEventListener('keydown', e => { if (e.key === 'Escape') { S.ui.filter.search=''; render(); } });

  /* Empty state buttons */
  q('#empty-add-phase')?.addEventListener('click',    () => openModal('add-phase'));
  q('#empty-load-sample')?.addEventListener('click',  () => loadSampleData());

  /* Add-new dropdown */
  q('#btn-add-new')?.addEventListener('click', e => {
    e.stopPropagation();
    const menu = q('#add-new-menu');
    const btn  = q('#btn-add-new');
    if (!menu) return;
    const opening = !menu.classList.contains('open');
    menu.classList.toggle('open', opening);
    btn?.setAttribute('aria-expanded', opening ? 'true' : 'false');
  });
  qAll('.add-dd-item').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      q('#add-new-menu')?.classList.remove('open');
      if (btn.dataset.add === 'import-csv') { openImportModal(currentProjId); return; }
      const type = btn.dataset.add === 'phase' ? 'add-phase' : btn.dataset.add;
      openModal(type);
    });
  });
  document.addEventListener('click', () => q('#add-new-menu')?.classList.remove('open'));

  /* Team label click → edit */
  qAll('.trl[data-team-id]').forEach(el => {
    el.addEventListener('click', e => {
      if (e.target.closest('[data-action]')) return; // let ctx menu handle
      const tm = S.teams.find(t => t.id === +el.dataset.teamId);
      if (tm) openModal('edit-team', tm);
    });
  });

  /* Tag filter pills click */
  qAll('.tf[data-tag]').forEach(el => {
    el.addEventListener('click', e => {
      const delBtn = e.target.closest('[data-del-tag]');
      if (delBtn) { e.stopPropagation(); delTag(delBtn.dataset.delTag); return; }
      S.ui.filter.tag = el.dataset.tag || '';
      render();
    });
    // Tag drag-to-assign
    el.addEventListener('dragstart', e => {
      const tag = el.dataset.tag;
      if (!tag) { e.preventDefault(); return; }
      S.ui.dragData = { type: 'tag', tag };
      e.dataTransfer.effectAllowed = 'copy';
    });

      if (S.ui.dragData?.type === 'tag') S.ui.dragData = null;
    });

  /* Filter selects */
  q('#f-phase')?.addEventListener('change', e => { S.ui.filter.phase = e.target.value; render(); });
  q('#f-team')?.addEventListener('change',  e => { S.ui.filter.team  = e.target.value; render(); });
  q('#f-tag')?.addEventListener('change',   e => { S.ui.filter.tag   = e.target.value; render(); });
  q('#f-status')?.addEventListener('change',e => { S.ui.filter.status= e.target.value; render(); });

  /* Add tag */
  q('#tf-add-btn')?.addEventListener('click', () => {
    const inp = q('#tf-add-inp');
    if (inp && inp.value.trim()) { addTag(inp.value.trim()); }
  });
  q('#tf-add-inp')?.addEventListener('keydown', e => {
    if (e.key === 'Enter') { const v = e.target.value.trim(); if (v) addTag(v); }

  /* Task cards – drag, click to open, tag-drop */
  qAll('.tc[data-task-id]').forEach(el => {
    const taskId = +el.dataset.taskId;

    /* Click card to open edit modal */
    el.addEventListener('click', e => {
      if (e.target.closest('[data-del-tag-from-card]')) return;
      const t = taskById(taskId);
      if (t) openModal('edit-task', t);
    });

    /* Drag card to timeline */
    el.addEventListener('dragstart', e => {
      if (S.ui.dragData?.type === 'tag') return; // tag drag in progress
      S.ui.dragData = {type:'backlog', taskId};
      setTimeout(() => el.classList.add('drg'), 0);
      e.dataTransfer.effectAllowed = 'move';
    });
    el.addEventListener('dragend', () => el.classList.remove('drg'));

    /* Accept tag drops */
    el.addEventListener('dragover', e => {
      if (S.ui.dragData?.type === 'tag') {
        e.preventDefault();
        e.stopPropagation();
        el.classList.add('tag-drop-target');
      }
    });
    el.addEventListener('dragleave', e => {
      if (!el.contains(e.relatedTarget)) el.classList.remove('tag-drop-target');
    });
    el.addEventListener('drop', e => {
      el.classList.remove('tag-drop-target');
      if (S.ui.dragData?.type === 'tag') {
        e.preventDefault();
        e.stopPropagation();
        const t = taskById(taskId);
        const tag = S.ui.dragData.tag;
        if (t && tag && !t.tags.includes(tag)) {
          t.tags.push(tag);
          S.ui.dragData = null;
          render();
        }
      }
    });

    el.addEventListener('contextmenu', e => {
      e.preventDefault();
      const t = taskById(taskId);
      openCtx(e.clientX, e.clientY, [
        {l:'Sửa task', icon:'edit', a:`edit-task:${t.id}`},
        '---',
        {l:'Xóa task', icon:'zap', a:`del-task:${t.id}`, d:true},
      ]);
    });
  });

  /* Timeline cells drop */
  qAll('.trc').forEach(el => {
    el.addEventListener('dragover', e => {
      if (!S.ui.dragData) return;
      e.preventDefault();
      el.classList.add('dh');
    });
    el.addEventListener('dragleave', () => el.classList.remove('dh'));
    el.addEventListener('drop', e => {
      e.preventDefault();
      el.classList.remove('dh');
      if (!S.ui.dragData) return;
      const week = +el.dataset.week;
      const teamId = +el.dataset.team;
      const t = taskById(S.ui.dragData.taskId);
      if (t) { pushHistory(); t.startWeek = week; t.teamId = teamId; }
      S.ui.dragData = null;
      render();
    });
  });

  /* Task bars */
  qAll('.tb').forEach(el => {
    el.addEventListener('click', e => {
      if (e.target.classList.contains('tb-rh')) return;
      if (S.ui.dragData) return;
      const t = taskById(+el.dataset.taskId);
      if (t) openModal('edit-task', t);
    });
    el.addEventListener('dragstart', e => {
      if (e.target.classList.contains('tb-rh')) { e.preventDefault(); return; }
      S.ui.dragData = {type:'bar', taskId: +el.dataset.taskId};
      setTimeout(() => el.classList.add('drg'), 0);
      e.dataTransfer.effectAllowed = 'move';
    });
    el.addEventListener('dragend', () => { el.classList.remove('drg'); S.ui.dragData = null; });
    el.addEventListener('contextmenu', e => {
      e.preventDefault();
      const t = taskById(+el.dataset.taskId);
      openCtx(e.clientX, e.clientY, [
        {l:'Sửa task', icon:'edit', a:`edit-task:${t.id}`},
        {l:'Đưa về backlog', icon:'layers', a:`unschedule:${t.id}`},
        '---',
        {l:'Xóa task', icon:'zap', a:`del-task:${t.id}`, d:true},
      ]);
    });
  });

  /* Task right resize */
  qAll('.tb-rh').forEach(el => {
    el.addEventListener('mousedown', e => {
      e.stopPropagation(); e.preventDefault();
      const id = +el.dataset.resize;
      const t = taskById(id);
      if (t) S.ui.resizeData = { taskId:id, side:'right', startX:e.clientX, origDur:t.dur, origStartWeek:t.startWeek };
    });
  });

  /* Task left resize */
  qAll('.tb-lh').forEach(el => {
    el.addEventListener('mousedown', e => {
      e.stopPropagation(); e.preventDefault();
      const id = +el.dataset.resizeLeft;
      const t = taskById(id);
      if (t) S.ui.resizeData = { taskId:id, side:'left', startX:e.clientX, origDur:t.dur, origStartWeek:t.startWeek };
    });
  });

  /* Phase resize handles */
  qAll('[data-ph-resize-left]').forEach(el => {
    el.addEventListener('mousedown', e => {
      e.stopPropagation(); e.preventDefault();
      const id = +el.dataset.phResizeLeft;
      const ph = phaseById(id);
      if (!ph) return;
      S.ui.phaseResize = {
        phaseId: id, side: 'left', startX: e.clientX,
        origStart: ph.startWeek, origEnd: ph.endWeek,
        origAll: S.phases.map(p => ({ id:p.id, startWeek:p.startWeek, endWeek:p.endWeek })),
      };
    });
  });
  qAll('[data-ph-resize-right]').forEach(el => {
    el.addEventListener('mousedown', e => {
      e.stopPropagation(); e.preventDefault();
      const id = +el.dataset.phResizeRight;
      const ph = phaseById(id);
      if (!ph) return;
      S.ui.phaseResize = {
        phaseId: id, side: 'right', startX: e.clientX,
        origStart: ph.startWeek, origEnd: ph.endWeek,
        origAll: S.phases.map(p => ({ id:p.id, startWeek:p.startWeek, endWeek:p.endWeek })),
      };
    });
  });

  /* Phase drag/swap */
  qAll('[data-ph-drag]').forEach(el => {
    el.addEventListener('dragstart', e => {
      S.ui.phaseDragId = +el.dataset.phDrag;
      e.dataTransfer.effectAllowed = 'move';
    });
    el.addEventListener('dragend', () => { S.ui.phaseDragId = null; });
  });
  qAll('.ph-cell:not(.ph-gap)').forEach(el => {
    el.addEventListener('dragover', e => {
      if (!S.ui.phaseDragId) return;
      const targetId = +el.dataset.phaseId;
      if (targetId !== S.ui.phaseDragId) {
        e.preventDefault();
        el.classList.add('ph-drag-over');
      }
    });
    el.addEventListener('dragleave', () => el.classList.remove('ph-drag-over'));
    el.addEventListener('drop', e => {
      e.preventDefault();
      el.classList.remove('ph-drag-over');
      const targetId = +el.dataset.phaseId;
      if (S.ui.phaseDragId && targetId !== S.ui.phaseDragId) {
        swapPhases(S.ui.phaseDragId, targetId);
        S.ui.phaseDragId = null;
        render();
      }
    });
  });

  /* Sidebar drop zone (unschedule) */
  const sb = q('#sidebar');
  if (sb) {
    sb.addEventListener('dragover', e => {
      if (S.ui.dragData?.type === 'bar') { e.preventDefault(); sb.classList.add('dh-zone'); }
    });
    sb.addEventListener('dragleave', () => sb.classList.remove('dh-zone'));
    sb.addEventListener('drop', e => {
      e.preventDefault(); sb.classList.remove('dh-zone');
      if (S.ui.dragData?.type === 'bar') {
        const t = taskById(S.ui.dragData.taskId);
        if (t) t.startWeek = null;
        S.ui.dragData = null;
        render();
      }
    });
  }

  /* Phase body – double-click to edit, right-click for context menu */
  qAll('.ph-body[data-ph-drag]').forEach(el => {
    el.addEventListener('dblclick', e => {
      e.preventDefault();
      const id = +el.dataset.phDrag;
      openModal('edit-phase', phaseById(id));
    });
    el.addEventListener('contextmenu', e => {
      e.preventDefault();
      const id = +el.dataset.phDrag;
      openCtx(e.clientX, e.clientY, [
        {l:'Sửa phase', icon:'edit', a:`edit-phase:${id}`},
        '---',
        {l:'Xóa phase', icon:'zap', a:`del-phase:${id}`, d:true},
      ]);
    });
  });

  /* Team label right-click */
  qAll('[data-team-ctx]').forEach(el => {
    el.addEventListener('contextmenu', e => {
      e.preventDefault();
      const id = +el.dataset.teamCtx;
      openCtx(e.clientX, e.clientY, [
        {l:'Sửa nhóm', icon:'edit', a:`edit-team:${id}`},

        {l:'Xóa nhóm', icon:'zap', a:`del-team:${id}`, d:true},
