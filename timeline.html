  /* Context menu actions */
  qAll('.ci[data-action]').forEach(el => {
    el.addEventListener('click', () => handleAction(el.dataset.action));
    el.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handleAction(el.dataset.action); }
    });
  });

  /* Scope textarea — save on input, persist on blur */
  qAll('[data-scope-id]').forEach(el => {
    el.addEventListener('input', () => {
      const ph = phaseById(+el.dataset.scopeId);
      if (ph) ph.scope = el.value;
    });
    el.addEventListener('blur', () => saveState());
  });

  /* Output checklist */
  qAll('[data-add-chk]').forEach(el => {
    el.addEventListener('click', () => {
      const ph = phaseById(+el.dataset.addChk);
      if (!ph) return;
      if (!ph.outputs) ph.outputs = [];
      ph.outputs.push({id: nextId(), text:'', done:false});
      render();
    });
  });

  qAll('[data-chk-toggle]').forEach(el => {
    el.addEventListener('change', () => {
      const [oid, pid] = el.dataset.chkToggle.split(':').map(Number);
      const ph = phaseById(pid);
      if (!ph) return;
      const o = ph.outputs?.find(x => x.id === oid);
      if (o) { o.done = el.checked; render(); }
    });
  });

  qAll('[data-chk-edit]').forEach(el => {
    el.addEventListener('input', () => {
      const [oid, pid] = el.dataset.chkEdit.split(':').map(Number);
      const ph = phaseById(pid);
      if (!ph) return;
      const o = ph.outputs?.find(x => x.id === oid);
      if (o) o.text = el.textContent;
    });
  });

  qAll('[data-del-chk]').forEach(el => {
    el.addEventListener('click', () => {
      const [oid, pid] = el.dataset.delChk.split(':').map(Number);
      const ph = phaseById(pid);
      if (!ph) return;
      ph.outputs = ph.outputs?.filter(x => x.id !== oid);
      render();
    });
  });

  /* Modal */
  if (S.ui.modal?.type === 'import') { bindImportModal(); }
  else { bindModal(); }

  /* Global close — remove before re-adding to prevent accumulation */
  document.removeEventListener('click', onDocClick);
  document.addEventListener('click', onDocClick, {once:true});
  document.removeEventListener('keydown', onKey);
  document.addEventListener('keydown', onKey);
}

function bindModal() {
  const bg = q('#modal-bg');
  if (!bg) return;
  const type = S.ui.modal?.type;

  /* Auto-focus first text input for keyboard accessibility */
  setTimeout(() => {
    const first = bg.querySelector('input[type=text],input:not([type]),input[type=date],input[type=number]');
    if (first) first.focus();
  }, 50);

  bg.addEventListener('click', e => { if (e.target === bg) closeModal(); });
  q('#m-cancel')?.addEventListener('click', closeModal);
  q('#m-save')?.addEventListener('click', () => {
    if (type === 'cfg')          saveCfg();
    if (type === 'add-task' || type === 'edit-task') saveTask();
    if (type === 'add-team' || type === 'edit-team') saveTeam();
    if (type === 'add-phase' || type === 'edit-phase') savePhase();
  });
  q('#m-del')?.addEventListener('click', () => {
    if (type === 'edit-task')  { delTask(S.ui.modal.data.id); }
    if (type === 'edit-team')  { delTeam(S.ui.modal.data.id); }
    if (type === 'edit-phase') { delPhase(S.ui.modal.data.id); }
    closeModal();
  });

  /* Reset all data */
  q('#m-reset')?.addEventListener('click', () => {
    if (!confirm('Xóa toàn bộ dữ liệu? Hành động này không thể hoàn tác.')) return;
    S.phases = []; S.teams = []; S.tasks = []; S._nextId = 1;
    try { localStorage.removeItem(LS_KEY); } catch(e) {}
    closeModal();
  });

  /* Week picker */
  bindWkPickerEvents();

  /* Share modal — copy link */
  const copyBtn = q('#share-copy-btn');
  const urlInp  = q('#share-url-inp');
  if (copyBtn && urlInp) {
    urlInp.addEventListener('click', () => urlInp.select());
    copyBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(urlInp.value).then(() => {
        copyBtn.textContent = '✓ Đã sao chép';
        copyBtn.classList.add('copied');
        setTimeout(() => { copyBtn.textContent = 'Sao chép'; copyBtn.classList.remove('copied'); }, 2200);
      }).catch(() => { urlInp.select(); document.execCommand('copy'); });
    });
  }

  /* Theme toggle buttons */
  qAll('[data-theme-set]').forEach(btn => {
    btn.addEventListener('click', () => setTheme(btn.dataset.themeSet));
  });

  /* Tag toggles */
  qAll('.to[data-tag]').forEach(el => {
    el.addEventListener('click', () => el.classList.toggle('sel'));
  });

  /* Icon grid */
  qAll('.ig[data-icon]').forEach(el => {
    el.addEventListener('click', () => {
      qAll('.ig').forEach(i => i.classList.remove('sel'));
      el.classList.add('sel');
    });
  });

  /* Color picker */
  qAll('.co[data-color]').forEach(el => {
    el.addEventListener('click', () => {
      qAll('.co').forEach(c => c.classList.remove('sel'));
      el.classList.add('sel');
    });
  });
}

/* ══════════════════════════════
   ACTIONS
══════════════════════════════ */
function handleAction(action) {
  closeCtx();
  const [cmd, id] = action.split(':');
  const nid = +id;
  if (cmd === 'edit-task')  openModal('edit-task',  taskById(nid));
  if (cmd === 'del-task')   { delTask(nid); render(); }
  if (cmd === 'unschedule') { const t = taskById(nid); if(t) t.startWeek=null; render(); }
  if (cmd === 'edit-team')  openModal('edit-team',  S.teams.find(t=>t.id===nid));
  if (cmd === 'del-team')   { delTeam(nid); render(); }
  if (cmd === 'edit-phase') openModal('edit-phase', phaseById(nid));
  if (cmd === 'del-phase')  { delPhase(nid); render(); }
}

function saveCfg() {
  S.cfg.title    = q('#m-cfg-title')?.value.trim() || S.cfg.title;
  S.cfg.subtitle = q('#m-cfg-sub')?.value.trim() || '';
  if (wkp.startMon && wkp.endMon) {
    S.cfg.start = dateStrYMD(wkp.startMon);
    const endSun = new Date(wkp.endMon); endSun.setDate(endSun.getDate() + 6);
    S.cfg.end = dateStrYMD(endSun);
  }
  closeModal();
}

function shakeErr(el, msg = 'Vui lòng điền thông tin bắt buộc') {
  if (!el) return;
  el.classList.remove('err');
  void el.offsetWidth;
  el.classList.add('err');
  el.focus();
  // Announce to screen readers
  const live = document.getElementById('err-live');
  if (live) { live.textContent = ''; setTimeout(() => live.textContent = msg, 10); }
}

function saveTask() {
  pushHistory();
  const name   = q('#m-name')?.value.trim();
  const teamId = +q('#m-team')?.value || null;
  const dur    = Math.max(1, +q('#m-dur')?.value || 2);
  const phaseId= +q('#m-phase')?.value || null;
  const tags   = [...qAll('.to.sel')].map(el => el.dataset.tag);
  if (!name) { shakeErr(q('#m-name')); return; }

  if (S.ui.modal.type === 'edit-task') {
    const t = taskById(S.ui.modal.data.id);
    Object.assign(t, {name, teamId, dur, phaseId, tags});
  } else {
    S.tasks.push({id:nextId(), name, teamId, dur, phaseId, tags, startWeek:null});
  }
  closeModal();
}

function saveTeam() {
  pushHistory();
  const name  = q('#m-tm-name')?.value.trim();
  const icon  = q('.ig.sel')?.dataset.icon || 'layers';
  const color = q('.co.sel')?.dataset.color || '#D0A052';
  if (!name) { shakeErr(q('#m-tm-name')); return; }

  if (S.ui.modal.type === 'edit-team') {
    const tm = S.teams.find(t => t.id === S.ui.modal.data.id);
    Object.assign(tm, {name, icon, color});
  } else {
    S.teams.push({id:nextId(), name, icon, color});
  }
  closeModal();
}

function savePhase() {
  pushHistory();
  const name = q('#m-ph-name')?.value.trim();
  const sw   = +q('#m-ph-s')?.value;
  const ew   = +q('#m-ph-e')?.value;
  const color= q('.co.sel')?.dataset.color || PHASE_COLORS[0];
  if (!name) { shakeErr(q('#m-ph-name')); return; }
  if (sw < 1 || ew < sw) return;

  if (S.ui.modal.type === 'edit-phase') {
    const ph = phaseById(S.ui.modal.data.id);
    Object.assign(ph, {name, startWeek:sw, endWeek:ew, color});
  } else {
    S.phases.push({id:nextId(), name, startWeek:sw, endWeek:ew, color, scope:'', outputs:[]});
  }
  closeModal();
}

function delTask(id)  { pushHistory(); S.tasks  = S.tasks.filter(t=>t.id!==id); }
function delTeam(id)  { pushHistory(); S.teams  = S.teams.filter(t=>t.id!==id); }
function delPhase(id) { pushHistory(); S.phases = S.phases.filter(p=>p.id!==id); S.tasks.forEach(t=>{if(t.phaseId===id)t.phaseId=null;}); }

function addTag(name) {
  const clean = name.trim().toLowerCase().replace(/\s+/g,'-');
  if (clean && !S.tags.includes(clean)) {
    S.tags.push(clean);
    render();
    setTimeout(() => { const inp = q('#tf-add-inp'); if(inp) inp.value=''; }, 0);
  }
}

function delTag(name) {
  S.tags = S.tags.filter(t => t !== name);
  S.tasks.forEach(t => { t.tags = t.tags.filter(g => g !== name); });
  if (S.ui.filter.tag === name) S.ui.filter.tag = '';
  render();
}

/* ══════════════════════════════
   MODAL / CTX HELPERS
══════════════════════════════ */
function openModal(type, data=null) {
  S.ui.modal = {type, data};
  if (type === 'cfg') {
    const sm = wkpMonday(parseDate(S.cfg.start));
    wkp.startMon = sm;
    wkp.endMon   = wkpMonday(parseDate(S.cfg.end));
    wkp.yr  = sm.getFullYear();
    wkp.mo  = sm.getMonth();
    wkp.step = 'start';
    wkp.showMonthSel = false;
  }
  render();
}

function closeModal() {
  S.ui.modal = null;
  render();
}

function openCtx(x, y, items) {
  S.ui.ctx = {x, y, items};
  render();
}

function closeCtx() {
  if (!S.ui.ctx) return;
  S.ui.ctx = null;
  render();
}

function onDocClick() { closeCtx(); }
function onKey(e) {
  const ctrl = e.ctrlKey || e.metaKey;

  // Modal open — Escape/Enter
  if (S.ui.modal) {
    if (e.key === 'Escape') { closeModal(); return; }
    if (e.key === 'Enter' && !e.shiftKey && e.target.tagName !== 'TEXTAREA') {
      q('#m-save')?.click(); return;
    }
    return;
  }
  if (S.ui.ctx) { if (e.key === 'Escape') { closeCtx(); return; } }

  // Undo / Redo
  if (ctrl && e.key === 'z' && !e.shiftKey) { e.preventDefault(); undo(); return; }
  if (ctrl && (e.key === 'y' || (e.key === 'z' && e.shiftKey))) { e.preventDefault(); redo(); return; }

  // Search shortcut
  if (ctrl && e.key === 'k') {
    e.preventDefault();
    const inp = q('#sb-search');
    if (inp) { inp.focus(); inp.select(); }
    return;
  }

  // Skip if typing in an input/textarea
  if (['INPUT','TEXTAREA','SELECT'].includes(document.activeElement?.tagName)) return;

  // Creation shortcuts
  if (e.key === 'n' && !ctrl) { e.preventDefault(); openModal('add-task'); }
  if (e.key === 'p' && !ctrl) { e.preventDefault(); openModal('add-phase'); }
  if (e.key === 't' && !ctrl) { e.preventDefault(); openModal('add-team'); }
}

/* ══════════════════════════════
   RESIZE (mouse)
══════════════════════════════ */
document.addEventListener('mousemove', e => {
  /* Task right resize */
  if (S.ui.resizeData) {
    const { taskId, side, startX, origDur, origStartWeek } = S.ui.resizeData;
    const delta = Math.round((e.clientX - startX) / WW);
    const t = taskById(taskId);
    if (t) {
      if (side === 'right') {
        t.dur = Math.max(1, origDur + delta);
      } else { // left
        const endWeek = origStartWeek + origDur - 1;
        const newStart = Math.max(1, origStartWeek + delta);
        t.startWeek = newStart;
        t.dur = Math.max(1, endWeek - newStart + 1);
      }
    }
    renderRAF();
    return;
  }

  /* Phase resize */
  if (S.ui.phaseResize) {
    const { phaseId, side, startX, origStart, origEnd, origAll } = S.ui.phaseResize;
    const delta = Math.round((e.clientX - startX) / WW);
    const ph = phaseById(phaseId);
    if (!ph) return;

    if (side === 'right') {
      const newEnd = Math.max(origStart + 1, origEnd + delta);
      ph.endWeek = newEnd;
      // restore all other phases to originals, then push
      origAll.forEach(o => {
        if (o.id !== phaseId) {
          const p = phaseById(o.id);
          if (p) { p.startWeek = o.startWeek; p.endWeek = o.endWeek; }
        }
      });
      pushPhasesAfter(phaseId, newEnd + 1);
    } else { // left
      const newStart = Math.max(1, Math.min(origEnd - 1, origStart + delta));
      ph.startWeek = newStart;
    }
    renderRAF();
  }
});

document.addEventListener('mouseup', () => {
  if (S.ui.resizeData)  { pushHistory(); S.ui.resizeData  = null; render(); }
  if (S.ui.phaseResize) { pushHistory(); S.ui.phaseResize = null; render(); }
});

async function exportPDF() {
  const el = document.getElementById('tl-inner');
  if (!el) return;

  /* Show loading overlay */
  const ov = document.createElement('div');
  ov.className = 'exp-ol';
  ov.innerHTML = `<div class="exp-spin"></div><span>Đang xuất PDF...</span>`;
  document.body.appendChild(ov);

  try {
    // html2canvas 1.4.1 cannot parse oklch() color values.
    // Chrome injects oklch for system colors (Canvas, ButtonFace, etc.) when
    // color-scheme:dark is active. inline/stylesheet overrides don't stop this
    // because html2canvas reads getComputedStyle() AFTER Chrome resolves system colors.
    //
    // Fix: monkey-patch window.getComputedStyle to intercept any oklch value
    // and return '' (empty string) instead. html2canvas treats '' as "not set"
    // and falls back to its backgroundColor option. Restore after capture.
    const _origGCS = window.getComputedStyle;
    const _stripOklch = (v) => (typeof v === 'string' && v.includes('oklch')) ? 'transparent' : v;
    window.getComputedStyle = function() {
      const cs = _origGCS.apply(this, arguments);
      return new Proxy(cs, {
        get(target, prop) {
          // Intercept getPropertyValue() — html2canvas calls this for most color reads
          if (prop === 'getPropertyValue') {
            return (name) => _stripOklch(target.getPropertyValue(name));
          }
          // Intercept getPropertyPriority() to avoid any oklch leaking through there
          if (prop === 'getPropertyPriority') {
            return (name) => {
              try { return target.getPropertyPriority(name); } catch { return ''; }
            };
          }
          const val = Reflect.get(target, prop);
          // Intercept direct property access (cs.backgroundColor, cs.color, etc.)
          if (typeof prop === 'string' && typeof val === 'string') {
            return _stripOklch(val);
          }
          return typeof val === 'function' ? val.bind(target) : val;
        }
      });
    };

    const bgColor = _origGCS(document.documentElement)
      .getPropertyValue('--bg').trim() || '#080808';

    let canvas;
    try {
      canvas = await html2canvas(el, {
        scale: 1.5,
        useCORS: true,
        allowTaint: true,
        logging: false,
        backgroundColor: bgColor,
        width:  el.scrollWidth,
        height: el.scrollHeight,
        windowWidth:  el.scrollWidth  + 300,
        windowHeight: el.scrollHeight + 100,
        x: 0, y: 0,
        scrollX: 0, scrollY: 0,
      });
    } finally {
      window.getComputedStyle = _origGCS; // always restore
    }

    const { jsPDF } = window.jspdf;
    const W = canvas.width, H = canvas.height;
    const scale = Math.min(800/W, 500/H);
    const pdf = new jsPDF({
      orientation: W > H ? 'landscape' : 'portrait',
      unit: 'pt',
      format: [W * scale + 60, H * scale + 100],
    });

    /* Title area */
    pdf.setFillColor(11, 11, 11);
    pdf.rect(0, 0, W * scale + 60, H * scale + 100, 'F');

    const imgData = canvas.toDataURL('image/png');
    pdf.addImage(imgData, 'PNG', 30, 60, W * scale, H * scale);

    /* Header bar */
    pdf.setFillColor(17, 17, 17);
    pdf.rect(0, 0, W * scale + 60, 50, 'F');

    /* Title text */
    pdf.setTextColor(240, 237, 232);
    pdf.setFontSize(13);
    pdf.setFont('helvetica', 'bold');
    pdf.text(S.cfg.title, 30, 22);
    if (S.cfg.subtitle) {
      pdf.setFontSize(9);
      pdf.setFont('helvetica', 'normal');
      pdf.setTextColor(138, 128, 120);
      pdf.text(S.cfg.subtitle, 30, 35);
    }

    /* Logo in top-right using SVG → image */
    const logoImg = new Image();
    logoImg.src = 'data:image/png;base64,' + LOGO_B64;
    await new Promise(res => { logoImg.onload = res; logoImg.onerror = res; });

    const lc = document.createElement('canvas');
    lc.width  = 136; lc.height = 44;
    const lctx = lc.getContext('2d');
    lctx.drawImage(logoImg, 0, 2, 136, 40);
    const logoData = lc.toDataURL('image/png');
    const pageW = W * scale + 60;
    pdf.addImage(logoData, 'PNG', pageW - 110, 8, 80, 32);

    /* Footer */
    const date = new Date().toLocaleDateString('vi-VN', {year:'numeric',month:'long',day:'numeric'});
    pdf.setFontSize(8);
    pdf.setTextColor(62, 58, 54);
    pdf.text(`Xuất lúc: ${date}`, 30, H * scale + 85);

    pdf.save(`roadmap-${S.cfg.title.replace(/\s+/g,'-')}.pdf`);
  } catch(err) {
    console.error(err);
    alert('Xuất PDF thất bại. Vui lòng thử lại.\n' + err.message);
  } finally {
    document.body.removeChild(ov);
  }
}

function q(sel)   { return document.querySelector(sel); }

function esc(s)   {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

const LS_KEY        = 'roadmap-state-v1';   // legacy key
const INDEX_KEY     = 'roadmap-index';
const PROJ_PFX      = 'roadmap-proj-';
const PROJ_ACCENTS  = ['#D0A052','#7c3aed','#1d4ed8','#047857','#be185d','#0e7490','#b45309','#e05757'];
let   currentProjId = null;    // null = Home, string = project id
let   homeCtxId     = null;    // which card's context menu is open

/* ── Index helpers ── */
function loadIndex() {
  try { const r = localStorage.getItem(INDEX_KEY); return r ? JSON.parse(r) : []; }
  catch(e) { return []; }
}
function saveIndex(idx) {
  try { localStorage.setItem(INDEX_KEY, JSON.stringify(idx)); } catch(e) {}
}

/* ── Project CRUD ── */
function projKey(id) { return PROJ_PFX + id; }

function createProject(name, subtitle, accent) {
  const id = 'proj_' + Date.now();
  const cfg = { title: name, subtitle: subtitle||'', start:'2025-06-02', end:'2025-11-30' };
  const data = { cfg, phases:[], teams:[], tasks:[], tags:['tracking','UX','tech','growth','research'], _nextId:1 };
  try { localStorage.setItem(projKey(id), JSON.stringify(data)); } catch(e) {}
  const idx = loadIndex();
  idx.push({ id, name, subtitle:subtitle||'', accent:accent||'#D0A052', updatedAt:Date.now(), stats:{phases:0,tasks:0,sched:0,start:cfg.start,end:cfg.end} });
  saveIndex(idx);
  location.hash = '#project-' + id;
}

function deleteProject(id) {
  try { localStorage.removeItem(projKey(id)); } catch(e) {}
  saveIndex(loadIndex().filter(p => p.id !== id));
  renderHome();
}

function duplicateProject(id) {
  const raw = localStorage.getItem(projKey(id));
  if (!raw) return;
  const data = JSON.parse(raw);
  data.cfg.title += ' (copy)';
  const newId = 'proj_' + Date.now();
  try { localStorage.setItem(projKey(newId), JSON.stringify(data)); } catch(e) {}
  const idx = loadIndex();
  const orig = idx.find(p => p.id === id);
  idx.push({ id:newId, name:data.cfg.title, subtitle:data.cfg.subtitle||'',
    accent:orig?.accent||'#D0A052', updatedAt:Date.now(),
    stats: orig ? {...orig.stats} : {phases:0,tasks:0,sched:0} });
  saveIndex(idx);
  renderHome();
}

function renameProject(id, name, subtitle, accent) {
  const idx = loadIndex();
  const p = idx.find(p => p.id === id);
  if (!p) return;
  p.name = name; p.subtitle = subtitle; p.updatedAt = Date.now();
  if (accent) p.accent = accent;
  saveIndex(idx);
  // Also update cfg in project data
  try {
    const raw = localStorage.getItem(projKey(id));
    if (raw) {
      const d = JSON.parse(raw);
      d.cfg.title = name; d.cfg.subtitle = subtitle;
      localStorage.setItem(projKey(id), JSON.stringify(d));
    }
  } catch(e) {}
  renderHome();
}

function loadProject(id) {
  // Reset S
  S.cfg = { title:'Project Roadmap', subtitle:'', start:'2025-06-02', end:'2025-11-30' };
  S.phases=[]; S.teams=[]; S.tasks=[];
  S.tags=['tracking','UX','tech','growth','research']; S._nextId=1;
  S.ui.filter={ phase:'', team:'', tag:'', status:'backlog', search:'' };
  S.ui.modal=null; S.ui.ctx=null; S.ui.dragData=null;
  S.ui.resizeData=null; S.ui.phaseResize=null; S.ui.phaseDragId=null;
  try {
    const raw = localStorage.getItem(projKey(id));
    if (!raw) return;
    const d = JSON.parse(raw);
    if (d.cfg)     S.cfg     = {...S.cfg, ...d.cfg};
    if (d.phases)  S.phases  = d.phases;
    if (d.teams)   S.teams   = d.teams;
    if (d.tasks)   S.tasks   = d.tasks;
    if (d.tags)    S.tags    = d.tags;
    if (d._nextId) S._nextId = d._nextId;
  } catch(e) {}
}

function updateIndexEntry() {
  if (!currentProjId) return;
  const idx = loadIndex();
  const p = idx.find(p => p.id === currentProjId);
  if (!p) return;
  p.name = S.cfg.title; p.subtitle = S.cfg.subtitle || '';
  p.updatedAt = Date.now();
  p.stats = {
    phases: S.phases.length,
    tasks:  S.tasks.length,
    sched:  S.tasks.filter(t => t.startWeek !== null).length,
    start:  S.cfg.start,
    end:    S.cfg.end,
  };
  saveIndex(idx);
}

function migrateOldData() {
  const old = localStorage.getItem(LS_KEY);
  if (!old) return;
  if (loadIndex().length > 0) { localStorage.removeItem(LS_KEY); return; }
  const id = 'proj_' + Date.now();
  try {
    const d = JSON.parse(old);
    localStorage.setItem(projKey(id), old);
    saveIndex([{ id, name:d.cfg?.title||'My Roadmap', subtitle:d.cfg?.subtitle||'',
      accent:'#D0A052', updatedAt:Date.now(),
      stats:{ phases:d.phases?.length||0, tasks:d.tasks?.length||0,
              sched:d.tasks?.filter(t=>t.startWeek!==null).length||0 } }]);
    localStorage.removeItem(LS_KEY);
  } catch(e) {}
}

/* ── Time helpers ── */
function timeAgo(ts) {
  const d = Math.floor((Date.now()-ts)/86400000);
  if (d===0) return 'Hôm nay';
  if (d===1) return 'Hôm qua';
  if (d<30)  return d+' ngày trước';
  const m = Math.floor(d/30);
  return m<12 ? m+' tháng trước' : Math.floor(m/12)+' năm trước';
}

/* ── Router ── */
function router() {
  const hash = location.hash;
  homeCtxId = null;
  // Share URL (#v1=...) — render roadmap in readonly, no project context
  if (hash.startsWith(SHARE_PREFIX)) {
    currentProjId = null;
    if (loadFromHash()) render();
    return;
  }
  if (hash.startsWith('#project-')) {
    const id = hash.slice(9);
    currentProjId = id;
    loadProject(id);
    render();
  } else {
    currentProjId = null;
    S.ui.modal = null;
    renderHome();
  }
}
window.addEventListener('hashchange', router);

function saveState() {
  if (!currentProjId) return; // don't save when on Home
  try {
    const toSave = { cfg:S.cfg, phases:S.phases, teams:S.teams,
      tasks:S.tasks, tags:S.tags, _nextId:S._nextId };
    localStorage.setItem(projKey(currentProjId), JSON.stringify(toSave));
    updateIndexEntry();
  } catch(e) {}
}

function loadState() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return;
    const saved = JSON.parse(raw);
    if (saved.cfg)     S.cfg     = {...S.cfg, ...saved.cfg};
    if (saved.phases)  S.phases  = saved.phases;
    if (saved.teams)   S.teams   = saved.teams;
    if (saved.tasks)   S.tasks   = saved.tasks;
    if (saved.tags)    S.tags    = saved.tags;
    if (saved._nextId) S._nextId = saved._nextId;
  } catch(e) { /* corrupted data, start fresh */ }
}

    </div>`;
  }

  /* ── Step 2: Preview ── */
  const { validatedRows = [], checkedRows = new Set() } = t;
  const errCount = validatedRows.filter(r => r._errors.length).length;
  const okChecked = [...checkedRows].filter(i => !validatedRows[i]?._errors.length).length;

  const tableRows = validatedRows.map((row, i) => {
    const hasErr = row._errors.length > 0;
    const isChecked = checkedRows.has(i);
    const rowCls = hasErr ? 'row-err' : (!isChecked ? 'row-skip' : '');
    const errTag = hasErr ? `<span class="imp-err-tag">${esc(row._errors[0])}</span>` : '';
    const startCell = row._weekStart ? esc(row.start_date) : `<span class="imp-badge-bl">Backlog</span>`;
    return `<tr class="${rowCls}" data-row-i="${i}">
      <td><input type="checkbox" class="imp-cb" data-i="${i}"${isChecked?' checked':''}${hasErr?' disabled':''}></td>
      <td>${esc(row.task_name||'—')}${errTag}</td>
      <td>${esc(row.phase_name||'—')}</td>
      <td>${esc(row.team_name||'—')}</td>
      <td>${startCell}</td>
      <td>${esc(row.end_date||'')}</td>
      <td>${esc((row.tags||'').replace(/[;|]/g,', ').substring(0,25))}</td>
    </tr>`;
  }).join('');

  return `<div class="mbg" id="modal-bg" role="presentation">
    <div class="mdl mdl-wide" role="dialog" aria-modal="true" aria-label="Import CSV - Xem trước">
      <h3><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="vertical-align:-2px;margin-right:6px"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>Import từ CSV</h3>
      ${stepsHtml}

      <div class="imp-preview-hd">
        <div class="imp-preview-summary" id="imp-summary">
          <b>${okChecked}</b> tasks sẽ import
          ${errCount ? `· <span class="err-c">${errCount} row lỗi bị bỏ qua</span>` : ''}
        </div>
        <button class="imp-back-btn" id="imp-back">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
          Quay lại
        </button>
      </div>

      <div class="imp-table-wrap">
        <table class="imp-tbl">
          <thead><tr>
            <th><input type="checkbox" id="imp-cb-all" title="Chọn/bỏ tất cả" checked></th>
            <th>Task</th><th>Phase</th><th>Team</th><th>Start</th><th>End</th><th>Tags</th>
          </tr></thead>
          <tbody>${tableRows}</tbody>
        </table>
      </div>

      <div class="mdl-btns" style="margin-top:14px">
        <button class="bsm b-sec" id="m-cancel">Hủy</button>
        <button class="bsm b-primary" id="imp-confirm"${okChecked===0?' disabled style="opacity:.45;cursor:not-allowed"':''}>✓ Import ${okChecked} task${okChecked!==1?'s':''}</button>
      </div>
    </div>
  </div>`;
}

/* ── Bind Import Modal ── */
function bindImportModal() {
  const t = S.ui.modal;
  if (!t || t.type !== 'import') return;

  const close = () => { S.ui.modal = null; rerender(); };
  q('#m-cancel')?.addEventListener('click', close);
  q('#modal-bg')?.addEventListener('click', e => { if (e.target.id === 'modal-bg') close(); });

  if (t.step === 1) {
    q('#imp-target')?.addEventListener('change', e => {
      t.targetId = e.target.value;
      if (!t.mode) t.mode = 'merge';
      rerender();
    });
    q('#imp-newname')?.addEventListener('input', e => { t.newProjName = e.target.value; });
    q('#imp-mode-merge')?.addEventListener('click', () => { t.mode = 'merge'; rerender(); });
    q('#imp-mode-replace')?.addEventListener('click', () => { t.mode = 'replace'; rerender(); });
    q('#imp-dl-tpl')?.addEventListener('click', downloadCSVTemplate);
    q('#imp-file-clear')?.addEventListener('click', () => {
      t.filename = ''; t.structError = null; t.parsedData = null; rerender();
    });
    const dz = q('#imp-dropzone');
    if (dz) {
      dz.addEventListener('click', () => q('#imp-file-input')?.click());
      dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
      dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
      dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('drag-over'); const f = e.dataTransfer.files[0]; if (f) handleCSVFile(f); });
    }
    q('#imp-file-input')?.addEventListener('change', e => { const f = e.target.files[0]; if (f) handleCSVFile(f); });

    q('#imp-next')?.addEventListener('click', () => {
      if (!t.parsedData) return;
      t.targetId = q('#imp-target')?.value || 'new';
      const nameEl = q('#imp-newname');
      if (nameEl) t.newProjName = nameEl.value.trim() || t.newProjName;

      let cfgStart, cfgEnd;
      if (t.targetId !== 'new') {
        try { const raw = localStorage.getItem(projKey(t.targetId)); if (raw) { const d = JSON.parse(raw); cfgStart = d.cfg?.start; cfgEnd = d.cfg?.end; } } catch(e) {}
      } else {
        const dates = t.parsedData.rows.flatMap(r => [r.start_date, r.end_date].filter(Boolean))
          .map(s => { try { const d = parseDate(s); return isNaN(d) ? null : d; } catch(e) { return null; } }).filter(Boolean);
        if (dates.length) {
          const mn = new Date(Math.min(...dates.map(d => d.getTime())));
          const mx = new Date(Math.max(...dates.map(d => d.getTime())));
          const dow = mn.getDay(); mn.setDate(mn.getDate() + (dow===0?-6:1-dow));
          cfgStart = dateStrYMD(mn); cfgEnd = dateStrYMD(mx);
        } else {
          const n = new Date(); const e2 = new Date(n); e2.setMonth(e2.getMonth()+6);
          cfgStart = dateStrYMD(n); cfgEnd = dateStrYMD(e2);
        }
      }
      t.cfgStart = cfgStart; t.cfgEnd = cfgEnd;
      t.validatedRows = validateCSVRows(t.parsedData.rows, cfgStart, cfgEnd);
      t.checkedRows = new Set(t.validatedRows.map((_,i)=>i).filter(i => !t.validatedRows[i]._errors.length));
      t.step = 2;
      rerender();
    });

  } else {
    q('#imp-back')?.addEventListener('click', () => { t.step = 1; rerender(); });

    qAll('.imp-cb').forEach(cb => {
      cb.addEventListener('change', () => {
        const i = parseInt(cb.dataset.i);
        cb.checked ? t.checkedRows.add(i) : t.checkedRows.delete(i);
        refreshImportPreview();
      });
    });
    q('#imp-cb-all')?.addEventListener('change', e => {
      qAll('.imp-cb:not(:disabled)').forEach(cb => {
        cb.checked = e.target.checked;
        const i = parseInt(cb.dataset.i);
        e.target.checked ? t.checkedRows.add(i) : t.checkedRows.delete(i);
      });
      refreshImportPreview();
    });
    q('#imp-confirm')?.addEventListener('click', executeCSVImport);
  }
}

function refreshImportPreview() {
  const t = S.ui.modal;
  if (!t || !t.validatedRows) return;
  const okChecked = [...t.checkedRows].filter(i => !t.validatedRows[i]?._errors.length).length;
  const errCount = t.validatedRows.filter(r => r._errors.length).length;
  const btn = q('#imp-confirm');
  if (btn) { btn.textContent = `✓ Import ${okChecked} task${okChecked!==1?'s':''}`; btn.disabled = okChecked===0; btn.style.opacity = okChecked===0?'.45':'1'; }
  const sum = q('#imp-summary');
  if (sum) sum.innerHTML = `<b>${okChecked}</b> tasks sẽ import${errCount?` · <span class="err-c">${errCount} row lỗi bị bỏ qua</span>`:''}`;
  qAll('.imp-tbl tr[data-row-i]').forEach(tr => {
    const i = parseInt(tr.dataset.rowI);
    const hasErr = t.validatedRows[i]?._errors.length > 0;
    if (!hasErr) tr.className = t.checkedRows.has(i) ? '' : 'row-skip';
  });
}

/* ── CSV Parsing ── */
function handleCSVFile(file) {
  const t = S.ui.modal;
  if (!t) return;
  const ext = file.name.split('.').pop().toLowerCase();
  if (ext !== 'csv' && file.type !== 'text/csv') {
    t.structError = `File không hợp lệ (nhận được .${ext}). Vui lòng chọn file .csv`;
    t.filename = ''; t.parsedData = null; rerender(); return;
  }
  const reader = new FileReader();
  reader.onload = e => {
    let text = e.target.result;
    if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1); // strip BOM
    const result = parseCSVText(text);
    if (result.error) { t.structError = result.error; t.filename = ''; t.parsedData = null; }
    else {
      t.structError = null; t.filename = file.name; t.parsedData = result;
      if (!t.newProjName) t.newProjName = file.name.replace(/\.csv$/i,'').replace(/[-_]/g,' ');
    }
    rerender();
  };
  reader.readAsText(file, 'UTF-8');
}

function parseCSVText(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  if (!lines.length) return { error: 'File CSV rỗng.' };
  const headers = parseCSVLine(lines[0]).map(h => h.trim().toLowerCase().replace(/\s+/g,'_'));
  if (!headers.includes('task_name')) return { error: `Thiếu cột bắt buộc "task_name". Cột hiện có: ${headers.join(', ')}` };
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    const vals = parseCSVLine(lines[i]);
    const row = {};
    headers.forEach((h,j) => { row[h] = (vals[j]||'').trim(); });
    rows.push(row);
  }
  if (!rows.length) return { error: 'File CSV không có dòng dữ liệu (chỉ có header).' };
  return { headers, rows };
}

function parseCSVLine(line) {
  const res = []; let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { if (inQ && line[i+1]==='"') { cur+='"'; i++; } else inQ=!inQ; }
    else if (c === ',' && !inQ) { res.push(cur); cur=''; }
    else cur += c;
  }
  res.push(cur); return res;
}

/* ── Validation ── */
function validateCSVRows(rows, cfgStart, cfgEnd) {
  const startMon = cfgStart ? startMonday(cfgStart) : null;
  const endDate  = cfgEnd   ? parseDate(cfgEnd)     : null;
  return rows.map(row => {
    const r = {...row, _errors:[], _weekStart:null, _weekDur:1};
    if (!r.task_name) { r._errors.push('Thiếu task_name'); return r; }
    const hasDates = r.start_date || r.end_date;
    if (!hasDates) return r; // backlog — OK
    let sd = null, ed = null;
    if (r.start_date) { try { sd = parseDate(r.start_date); if (isNaN(sd.getTime())) sd=null; } catch(e){} if (!sd) r._errors.push(`start_date không hợp lệ`); }
    if (r.end_date)   { try { ed = parseDate(r.end_date);   if (isNaN(ed.getTime())) ed=null; } catch(e){} if (!ed) r._errors.push(`end_date không hợp lệ`); }
    if (sd && ed && sd > ed) r._errors.push('start_date sau end_date');
    if (sd && startMon && sd < startMon) r._errors.push(`start_date trước ngày bắt đầu project`);
    if (ed && endDate && ed > new Date(endDate.getTime()+7*86400000)) r._errors.push(`end_date vượt ngoài timeline`);
    if (!r._errors.length && sd && startMon) {
      const diffDays = (sd - startMon) / 86400000;
      r._weekStart = Math.max(1, Math.floor(diffDays/7)+1);
      if (ed) {
        const diffEnd = (ed - startMon) / 86400000;
        r._weekDur = Math.max(1, Math.floor(diffEnd/7)+1 - r._weekStart + 1);
      }
    }
    return r;
  });
}

/* ── Execute Import ── */
function executeCSVImport() {
  const t = S.ui.modal;
  if (!t) return;
  const { targetId, mode, newProjName, validatedRows, checkedRows, cfgStart, cfgEnd } = t;
  const rowsToImport = validatedRows.filter((_,i) => checkedRows.has(i) && !validatedRows[i]._errors.length);
  if (!rowsToImport.length) return;

  let projId, projData;
  if (targetId === 'new') {
    projId = 'proj_' + Date.now();
    projData = { cfg:{title:newProjName||'Imported Project',subtitle:'',start:cfgStart,end:cfgEnd}, phases:[], teams:[], tasks:[], tags:['tracking','UX','tech','growth','research'], _nextId:1 };
  } else {
    projId = targetId;
    try { const raw = localStorage.getItem(projKey(projId)); projData = raw ? JSON.parse(raw) : null; } catch(e) {}
    if (!projData) { showToast('Không tìm thấy project!'); return; }
    if (mode === 'replace') { projData.phases=[]; projData.teams=[]; projData.tasks=[]; projData._nextId=1; }
  }

  let nid = projData._nextId || 1;
  const nxtId = () => nid++;
  const phaseMap = {}, teamMap = {};
  (projData.phases||[]).forEach(p => { phaseMap[p.name.toLowerCase()] = p.id; });
  (projData.teams||[]).forEach(t2 => { teamMap[t2.name.toLowerCase()] = t2.id; });

  const teamIcons = ['package','code','heart','bar','users','star','globe','target'];
  rowsToImport.forEach(row => {
    const pn = (row.phase_name?.trim()||'Uncategorized').toLowerCase();
    if (!phaseMap[pn]) {
      const pid = nxtId();
      const ci = Object.keys(phaseMap).length % PHASE_COLORS.length;
      projData.phases.push({id:pid, name:row.phase_name?.trim()||'Uncategorized', startWeek:1, endWeek:4, color:PHASE_COLORS[ci], scope:'', outputs:[]});
      phaseMap[pn] = pid;
    }
    if (row.team_name?.trim()) {
      const tn = row.team_name.trim().toLowerCase();
      if (!teamMap[tn]) {
        const tid = nxtId();
        const ci = Object.keys(teamMap).length;
        projData.teams.push({id:tid, name:row.team_name.trim(), icon:teamIcons[ci%teamIcons.length], color:PROJ_ACCENTS[ci%PROJ_ACCENTS.length]});
        teamMap[tn] = tid;
      }
    }
  });

  rowsToImport.forEach(row => {
    const phaseId = phaseMap[(row.phase_name?.trim()||'Uncategorized').toLowerCase()] || null;
    const teamId  = row.team_name?.trim() ? (teamMap[row.team_name.trim().toLowerCase()]||null) : null;
    const tags    = row.tags ? row.tags.split(/[;,|]/).map(s=>s.trim()).filter(Boolean) : [];
    projData.tasks.push({id:nxtId(), name:row.task_name, phaseId, teamId, startWeek:row._weekStart||null, dur:row._weekDur||1, tags, desc:row.description||''});
  });

  // Auto-fit phase ranges to cover their tasks
  projData.phases.forEach(phase => {
    const pt = projData.tasks.filter(t2 => t2.phaseId===phase.id && t2.startWeek!==null);
    if (pt.length) { phase.startWeek=Math.min(...pt.map(t2=>t2.startWeek)); phase.endWeek=Math.max(...pt.map(t2=>t2.startWeek+t2.dur-1)); }
  });
  projData._nextId = nid;

  try { localStorage.setItem(projKey(projId), JSON.stringify(projData)); }
  catch(e) { showToast('Lỗi lưu dữ liệu — dung lượng đầy?'); return; }

  const idx = loadIndex();
  const ex = idx.find(p => p.id === projId);
  const statsObj = { phases:projData.phases.length, tasks:projData.tasks.length, sched:projData.tasks.filter(t2=>t2.startWeek!==null).length, start:projData.cfg.start, end:projData.cfg.end };
  if (ex) { ex.updatedAt=Date.now(); ex.stats=statsObj; }
  else idx.push({ id:projId, name:projData.cfg.title, subtitle:'', accent:t.newProjAccent||'#D0A052', updatedAt:Date.now(), stats:statsObj });
  saveIndex(idx);

  S.ui.modal = null;
  const cnt = rowsToImport.length;
  showToast(`✓ Đã import ${cnt} task${cnt!==1?'s':''} · ${projData.phases.length} phases`);
  location.hash = '#project-' + projId;
}

/* ── Download Template ── */
function downloadCSVTemplate() {
  const now = new Date();
  const fmt = d => dateStrYMD(d);
  const addW = w => { const d = new Date(now); d.setDate(d.getDate()+w*7); return fmt(d); };
  const headers = ['task_name','phase_name','team_name','start_date','end_date','tags','description'];
  const rows = [
    ['User Research',       'Discovery','Product',addW(0), addW(2), 'ux;research','Phỏng vấn người dùng'],
    ['Competitive Analysis','Discovery','Product',addW(2), addW(4), 'research',   'Phân tích đối thủ'],
    ['Wireframes',          'Design',   'Design', addW(4), addW(7), 'ux',         'Thiết kế wireframe chính'],
    ['Prototype v1',        'Design',   'Design', addW(7), addW(10),'ux',         'Prototype tương tác'],
    ['Backend API',         'Build',    'Eng',    addW(10),addW(14),'tech',       'Xây dựng REST API'],
    ['Frontend',            'Build',    'Eng',    addW(12),addW(16),'tech',       ''],
    ['Write spec',          '',         '',       '',      '',      '',           'Chưa có lịch - sẽ vào Backlog'],
    ['Launch plan',         '',         'Product','',      '',      'growth',     'Kế hoạch ra mắt'],
  ];
  const esc2 = v => (v.includes(',')||v.includes('"')||v.includes('\n')) ? `"${v.replace(/"/g,'""')}"` : v;
  const csv = [headers.join(','), ...rows.map(r => r.map(esc2).join(','))].join('\n');
  const blob = new Blob(['﻿'+csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='roadmap-template.csv'; a.click();
  URL.revokeObjectURL(url);
}

loadTheme();
migrateOldData();
// If no hash yet, go to home
if (!location.hash || location.hash === '#') location.hash = '#home';
router();
setTimeout(() => { if (_history.length === 0) pushHistory(); }, 0);

/* Re-calc WW when window resizes (only matters for fill-mode ≤12 weeks) */
let _resizeTimer = null;
window.addEventListener('resize', () => {
  clearTimeout(_resizeTimer);
  _resizeTimer = setTimeout(() => render(true), 150);
});
</script>
